<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Armor Rat – Mid-Air Protocol (Prototype)</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Share+Tech+Mono&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: #060a12;
      font-family: 'Share Tech Mono', monospace;
      overflow: hidden;
    }

    .wrap {
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 12px;
    }

    canvas {
      background: #0b0f1a;
      border: 1px solid rgba(98,228,130,.18);
      border-radius: 12px;
      box-shadow:
        0 0 0 1px rgba(98,228,130,.06),
        0 12px 60px rgba(0,0,0,.7),
        0 0 80px rgba(98,228,130,.04);
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      max-width: min(980px, 96vw);
      max-height: 92vh;
      width: 980px;
      height: auto;
      touch-action: none;
    }

    /* Mobile controls */
    .mobile-controls {
      display: none;
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 120px;
      pointer-events: none;
      z-index: 10;
    }

    .btn-jump {
      pointer-events: all;
      position: absolute;
      bottom: 24px;
      right: 32px;
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: rgba(98,228,130,.15);
      border: 2px solid rgba(98,228,130,.5);
      color: rgba(98,228,130,.9);
      font-family: 'Orbitron', sans-serif;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.05em;
      cursor: pointer;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.1s, transform 0.08s;
      box-shadow: 0 0 20px rgba(98,228,130,.12);
    }
    .btn-jump:active {
      background: rgba(98,228,130,.32);
      transform: scale(0.94);
    }

    @media (pointer: coarse), (max-width: 700px) {
      .mobile-controls { display: block; }
    }

    .hud-hint {
      position: fixed;
      left: 12px; bottom: 10px;
      font-size: 12px;
      line-height: 1.5;
      color: rgba(255,255,255,.45);
      font-family: 'Share Tech Mono', monospace;
      user-select: none;
      pointer-events: none;
    }
    .hud-hint kbd {
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.15);
      padding: 1px 5px;
      border-radius: 4px;
      color: rgba(255,255,255,.7);
    }
  </style>
</head>
<body>
  <div class="wrap"><canvas id="c" width="980" height="560"></canvas></div>

  <div class="mobile-controls">
    <button class="btn-jump" id="btnJump">JUMP</button>
  </div>

  <div class="hud-hint">
    <div><kbd>Space</kbd> прыжок · броня растёт в воздухе · 100% → удар при приземлении</div>
    <div><kbd>R</kbd> рестарт · <kbd>P</kbd> пауза</div>
  </div>

<script>
(() => {
  // ─── Canvas setup ───────────────────────────────────────────────────────────
  const canvas = document.getElementById("c");
  const ctx = canvas.getContext("2d");
  const W = canvas.width, H = canvas.height;

  // ─── Utilities ──────────────────────────────────────────────────────────────
  const clamp = (v, a, b) => Math.max(a, Math.min(b, v));
  const lerp  = (a, b, t) => a + (b - a) * t;
  const rand  = (a, b) => a + Math.random() * (b - a);

  // ─── Assets ─────────────────────────────────────────────────────────────────
  const sprite  = new Image(); sprite.src  = "sprite.png";
  const artbook = new Image(); artbook.src = "artbook.png";

  // ─── Web Audio ──────────────────────────────────────────────────────────────
  let audioCtx = null;

  function getAudio() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    return audioCtx;
  }

  function playJumpSound() {
    try {
      const ac = getAudio();
      const osc = ac.createOscillator();
      const gain = ac.createGain();
      osc.connect(gain); gain.connect(ac.destination);
      osc.type = "square";
      osc.frequency.setValueAtTime(320, ac.currentTime);
      osc.frequency.exponentialRampToValueAtTime(180, ac.currentTime + 0.12);
      gain.gain.setValueAtTime(0.09, ac.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.15);
      osc.start(); osc.stop(ac.currentTime + 0.15);
    } catch(e) {}
  }

  function playArmorUp() {
    try {
      const ac = getAudio();
      const osc = ac.createOscillator();
      const gain = ac.createGain();
      osc.connect(gain); gain.connect(ac.destination);
      osc.type = "sawtooth";
      osc.frequency.setValueAtTime(440 + p.armor * 4, ac.currentTime);
      osc.frequency.exponentialRampToValueAtTime(660 + p.armor * 6, ac.currentTime + 0.04);
      gain.gain.setValueAtTime(0.04, ac.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.06);
      osc.start(); osc.stop(ac.currentTime + 0.06);
    } catch(e) {}
  }

  function playImpactSound() {
    try {
      const ac = getAudio();
      // Low boom
      const osc = ac.createOscillator();
      const gain = ac.createGain();
      osc.connect(gain); gain.connect(ac.destination);
      osc.type = "sawtooth";
      osc.frequency.setValueAtTime(90, ac.currentTime);
      osc.frequency.exponentialRampToValueAtTime(30, ac.currentTime + 0.35);
      gain.gain.setValueAtTime(0.28, ac.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.35);
      osc.start(); osc.stop(ac.currentTime + 0.35);

      // Crunch noise layer
      const bufSize = ac.sampleRate * 0.18;
      const buf = ac.createBuffer(1, bufSize, ac.sampleRate);
      const data = buf.getChannelData(0);
      for (let i = 0; i < bufSize; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / bufSize);
      const src = ac.createBufferSource();
      src.buffer = buf;
      const ng = ac.createGain();
      src.connect(ng); ng.connect(ac.destination);
      ng.gain.setValueAtTime(0.18, ac.currentTime);
      ng.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.18);
      src.start();
    } catch(e) {}
  }

  // ─── Input ──────────────────────────────────────────────────────────────────
  const keys = new Set();
  window.addEventListener("keydown", e => {
    if (e.code === "Space") e.preventDefault();
    keys.add(e.code);
  });
  window.addEventListener("keyup", e => keys.delete(e.code));

  // Mobile jump button
  const btnJump = document.getElementById("btnJump");
  btnJump.addEventListener("touchstart", e => { e.preventDefault(); keys.add("Space"); }, { passive: false });
  btnJump.addEventListener("touchend",   e => { e.preventDefault(); keys.delete("Space"); }, { passive: false });
  btnJump.addEventListener("mousedown",  e => { keys.add("Space"); });
  btnJump.addEventListener("mouseup",    e => keys.delete("Space"));

  // ─── Constants ──────────────────────────────────────────────────────────────
  const GRAV         = 2400;
  const JUMP         = 820;
  const ARMOR_RATE   = 85;
  const AIR_DAMP     = 0.995;
  const COYOTE_TIME  = 0.10;   // seconds after leaving ground where you can still jump
  const JUMP_BUFFER  = 0.12;   // seconds to buffer a jump input before landing

  const groundY = Math.floor(H * 0.80);

  // ─── State ──────────────────────────────────────────────────────────────────
  let paused  = false;
  let started = false;
  const world = { time: 0, camShake: 0, camOffX: 0, camOffY: 0 };

  const p = {
    x: 160, y: groundY, vx: 150, vy: 0,
    onGround: true, armor: 0,
    coyoteTimer: 0,
    jumpBufferTimer: 0,
    armorTickTimer: 0,
    prevArmor: 0,
  };

  const impact = { active: false, t: 0, x: 0, y: 0 };

  // Particles
  const particles = [];

  function spawnImpactParticles(x, y) {
    for (let i = 0; i < 28; i++) {
      const angle = rand(-Math.PI, 0); // upward hemisphere
      const speed = rand(120, 600);
      particles.push({
        x, y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        life: 1, decay: rand(1.4, 2.8),
        r: rand(2, 7),
        hue: rand(40, 70),
      });
    }
    // Ground shards
    for (let i = 0; i < 12; i++) {
      particles.push({
        x: x + rand(-80, 80), y,
        vx: rand(-180, 180), vy: rand(-200, -60),
        life: 1, decay: rand(2, 3.5),
        r: rand(3, 9),
        hue: 130, // green grass chunks
      });
    }
  }

  function spawnArmorParticle(x, y) {
    particles.push({
      x: x + rand(-20, 60),
      y: y + rand(-30, 10),
      vx: rand(-60, 60),
      vy: rand(-120, -40),
      life: 1, decay: rand(3, 5),
      r: rand(1, 3),
      hue: rand(200, 240),
    });
  }

  function reset() {
    p.x = 160; p.y = groundY; p.vx = 150; p.vy = 0;
    p.onGround = true; p.armor = 0;
    p.coyoteTimer = 0; p.jumpBufferTimer = 0;
    p.armorTickTimer = 0; p.prevArmor = 0;
    impact.active = false; impact.t = 0;
    world.time = 0; world.camShake = 0;
    particles.length = 0;
  }

  function stageFromArmor(a) { return a < 25 ? 0 : a < 55 ? 1 : a < 85 ? 2 : 3; }

  // ─── Stars (generated once) ──────────────────────────────────────────────────
  const stars = Array.from({ length: 60 }, () => ({
    x: rand(0, W), y: rand(0, H * 0.55),
    r: rand(0.5, 2.0),
    twinkle: rand(0, Math.PI * 2),
    speed: rand(0.8, 2.5),
  }));

  // ─── Draw: background ────────────────────────────────────────────────────────
  function drawBackground(t) {
    // Sky gradient
    const g = ctx.createLinearGradient(0, 0, 0, H);
    g.addColorStop(0,     "#0d1a3a");
    g.addColorStop(0.45,  "#1c4cff");
    g.addColorStop(0.58,  "#6cc7ff");
    g.addColorStop(0.581, "#142232");
    g.addColorStop(1,     "#060a12");
    ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);

    // Scan lines
    ctx.globalAlpha = 0.04; ctx.fillStyle = "#000";
    for (let y = 0; y < H; y += 3) ctx.fillRect(0, y, W, 1);
    ctx.globalAlpha = 1;

    // Stars
    for (const s of stars) {
      const alpha = 0.4 + 0.4 * Math.sin(t * s.speed + s.twinkle);
      ctx.globalAlpha = alpha;
      ctx.fillStyle = "#fff";
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;

    // Clouds
    ctx.globalAlpha = 0.18; ctx.fillStyle = "#cef";
    const base = (t * 18) % (W + 260) - 260;
    for (let i = 0; i < 7; i++) {
      const x = base + i * 220, y = 92 + (i % 2) * 18;
      ctx.fillRect(x, y, 120, 6);
      ctx.fillRect(x + 18, y + 10, 160, 6);
    }
    ctx.globalAlpha = 1;

    // Silhouette buildings
    ctx.globalAlpha = 0.22; ctx.fillStyle = "#000";
    for (let i = 0; i < 14; i++) {
      const x = (i * 90 - (t * 28) % 90);
      const hh = 30 + (i % 5) * 10;
      ctx.fillRect(x, groundY - 120 - hh, 60, hh);
      ctx.fillRect(x + 18, groundY - 140 - hh, 24, 20);
      // Windows
      ctx.globalAlpha = 0.30; ctx.fillStyle = "rgba(255,230,100,.6)";
      for (let wy = groundY - 120 - hh + 8; wy < groundY - 120; wy += 12) {
        for (let wx = x + 6; wx < x + 54; wx += 12) {
          if (Math.sin(wx * 3.7 + wy * 1.3) > 0.2) ctx.fillRect(wx, wy, 5, 5);
        }
      }
      ctx.globalAlpha = 0.22; ctx.fillStyle = "#000";
    }
    ctx.globalAlpha = 1;

    // Ground shadow
    ctx.fillStyle = "rgba(0,0,0,.30)";
    ctx.fillRect(0, groundY, W, H - groundY);

    // Grass
    ctx.fillStyle = "rgba(98,228,130,.92)";
    const scroll = (t * 120) % 10;
    for (let x = -10; x < W + 10; x += 10) {
      const hh = 6 + ((Math.floor((x + scroll) / 10)) % 3) * 2;
      ctx.fillRect(x, groundY - hh, 10, hh);
    }

    // Ground glow line
    ctx.globalAlpha = 0.18;
    const gl = ctx.createLinearGradient(0, groundY - 2, 0, groundY + 4);
    gl.addColorStop(0, "#62e482"); gl.addColorStop(1, "transparent");
    ctx.fillStyle = gl;
    ctx.fillRect(0, groundY - 2, W, 6);
    ctx.globalAlpha = 1;
  }

  // ─── Draw: particles ─────────────────────────────────────────────────────────
  function updateAndDrawParticles(dt) {
    for (let i = particles.length - 1; i >= 0; i--) {
      const pt = particles[i];
      pt.life -= pt.decay * dt;
      if (pt.life <= 0) { particles.splice(i, 1); continue; }
      pt.vy += 1200 * dt;
      pt.x += pt.vx * dt;
      pt.y += pt.vy * dt;
      ctx.globalAlpha = pt.life * 0.9;
      ctx.fillStyle = `hsl(${pt.hue}, 90%, 65%)`;
      ctx.beginPath();
      ctx.arc(pt.x, pt.y, pt.r * pt.life, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }

  // ─── Draw: HUD ───────────────────────────────────────────────────────────────
  function drawHUD() {
    const x = 16, y = 16, bw = 360, bh = 20;

    // Bar bg
    ctx.fillStyle = "rgba(0,0,0,.45)";
    ctx.fillRect(x - 1, y - 1, bw + 2, bh + 2);

    // Armor fill with gradient
    const fill = (bw - 2) * (p.armor / 100);
    if (fill > 0) {
      const ag = ctx.createLinearGradient(x + 1, 0, x + 1 + fill, 0);
      ag.addColorStop(0, "rgba(98,228,130,.8)");
      ag.addColorStop(0.6, "rgba(255,230,120,.95)");
      ag.addColorStop(1, p.armor >= 100 ? "rgba(255,180,60,1)" : "rgba(255,210,80,.95)");
      ctx.fillStyle = ag;
      ctx.fillRect(x + 1, y + 1, fill, bh - 2);
    }

    // Bar border
    ctx.strokeStyle = p.armor >= 100
      ? `rgba(255,200,60,${0.6 + 0.4 * Math.sin(world.time * 8)})`
      : "rgba(255,255,255,.22)";
    ctx.lineWidth = 1;
    ctx.strokeRect(x, y, bw, bh);

    // Label
    const stage = stageFromArmor(p.armor);
    const stageNames = ["BARE", "HELM", "TORSO", "FULL ARMOR"];
    ctx.fillStyle = "rgba(255,255,255,.88)";
    ctx.font = "13px 'Share Tech Mono', monospace";
    const charging = !p.onGround ? " [CHARGING]" : "";
    ctx.fillText(
      `ARMOR ${Math.round(p.armor)}%  ·  ${stageNames[stage]}${charging}`,
      x, y + bh + 15
    );

    // Title
    ctx.globalAlpha = 0.7;
    ctx.font = "14px 'Orbitron', monospace";
    ctx.fillStyle = "rgba(98,228,130,.8)";
    ctx.fillText("ARMOR RAT", x, H - 18);
    ctx.font = "11px 'Share Tech Mono', monospace";
    ctx.fillStyle = "rgba(255,255,255,.5)";
    ctx.fillText("  MID-AIR PROTOCOL — prototype", x + 96, H - 18);
    ctx.globalAlpha = 1;

    if (paused) {
      ctx.save();
      ctx.globalAlpha = 0.82;
      ctx.fillStyle = "rgba(0,0,0,.6)";
      ctx.fillRect(0, 0, W, H);
      ctx.globalAlpha = 1;
      ctx.fillStyle = "rgba(255,255,255,.95)";
      ctx.font = "bold 32px 'Orbitron', monospace";
      ctx.textAlign = "center";
      ctx.fillText("ПАУЗА", W / 2, H / 2 - 8);
      ctx.font = "14px 'Share Tech Mono', monospace";
      ctx.fillStyle = "rgba(98,228,130,.8)";
      ctx.fillText("нажми P чтобы продолжить", W / 2, H / 2 + 22);
      ctx.textAlign = "left";
      ctx.restore();
    }
  }

  // ─── Draw: impact ────────────────────────────────────────────────────────────
  function drawImpact() {
    if (!impact.active) return;
    const t = impact.t;
    ctx.save();

    // Shockwave ring
    ctx.globalAlpha = Math.pow(1 - t, 1.5) * 0.85;
    ctx.strokeStyle = "rgba(255,230,80,1)";
    ctx.lineWidth = 5 * (1 - t);
    ctx.beginPath();
    ctx.arc(impact.x, impact.y, 12 + t * 180, 0, Math.PI * 2);
    ctx.stroke();

    // Second ring (delayed)
    if (t > 0.1) {
      const t2 = (t - 0.1) / 0.9;
      ctx.globalAlpha = Math.pow(1 - t2, 2) * 0.5;
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.arc(impact.x, impact.y, 12 + t2 * 250, 0, Math.PI * 2);
      ctx.stroke();
    }

    // Ground flash
    ctx.globalAlpha = Math.pow(1 - t, 2) * 0.5;
    const gf = ctx.createLinearGradient(0, groundY - 6, 0, groundY + 2);
    gf.addColorStop(0, "rgba(255,230,80,1)");
    gf.addColorStop(1, "transparent");
    ctx.fillStyle = gf;
    ctx.fillRect(0, groundY - 6, W, 8);

    ctx.restore();
  }

  // ─── Draw: rat ───────────────────────────────────────────────────────────────
  function drawRat() {
    if (!sprite.complete || sprite.naturalWidth === 0) {
      ctx.fillStyle = "#62e482";
      ctx.fillRect(p.x, p.y - 40, 60, 40);
      return;
    }

    const frames = 4;
    const fw = Math.floor(sprite.naturalWidth / frames);
    const fh = sprite.naturalHeight;
    const frame = stageFromArmor(p.armor);
    const sx = frame * fw;

    const tilt = p.onGround ? 0 : clamp(-p.vy / 1800, -0.38, 0.38);
    const scale = 1.35;
    const dw = fw * scale, dh = fh * scale;
    const px = p.x, py = p.y - dh + 6;

    ctx.save();

    // Camera shake offset
    if (world.camShake > 0) {
      ctx.translate(world.camOffX, world.camOffY);
    }

    // Landing glow
    if (impact.active && p.onGround) {
      const tt = impact.t;
      ctx.globalAlpha = (1 - tt) * 0.6;
      const rg = ctx.createRadialGradient(
        px + dw * 0.5, py + dh * 0.5, 0,
        px + dw * 0.5, py + dh * 0.5, dw * 0.7
      );
      rg.addColorStop(0, "rgba(255,230,80,.9)");
      rg.addColorStop(1, "transparent");
      ctx.fillStyle = rg;
      ctx.fillRect(px - dw * 0.3, py, dw * 1.6, dh);
      ctx.globalAlpha = 1;
    }

    // Armor charge glow (grows with armor %)
    if (!p.onGround && p.armor > 30) {
      const glowStr = (p.armor - 30) / 70;
      ctx.globalAlpha = glowStr * 0.35;
      const ag = ctx.createRadialGradient(
        px + dw * 0.5, py + dh * 0.4, 0,
        px + dw * 0.5, py + dh * 0.4, dw
      );
      ag.addColorStop(0, "rgba(100,180,255,1)");
      ag.addColorStop(1, "transparent");
      ctx.fillStyle = ag;
      ctx.fillRect(px - dw * 0.5, py - dh * 0.3, dw * 2, dh * 1.5);
      ctx.globalAlpha = 1;
    }

    ctx.translate(px + dw / 2, py + dh / 2);
    ctx.rotate(tilt);
    ctx.translate(-dw / 2, -dh / 2);

    // Drop shadow
    ctx.globalAlpha = 0.22;
    ctx.fillStyle = "#000";
    ctx.fillRect(dw * 0.1, dh * 0.88, dw * 0.8, dh * 0.05);
    ctx.globalAlpha = 1;

    // Draw sprite frame
    ctx.imageSmoothingEnabled = false;
    ctx.drawImage(sprite, sx, 0, fw, fh, 0, 0, dw, dh);

    // Speed lines (in air)
    if (!p.onGround) {
      ctx.globalAlpha = 0.45;
      ctx.fillStyle = "rgba(255,255,255,.9)";
      for (let i = 0; i < 4; i++) {
        const lineLen = 10 + i * 8;
        ctx.fillRect(-24 - i * 14, dh * (0.55 + i * 0.08), lineLen, 2);
      }
      ctx.globalAlpha = 1;
    }

    ctx.restore();
  }

  // ─── Draw: splash ────────────────────────────────────────────────────────────
  function drawSplash() {
    drawBackground(world.time);

    if (artbook.complete && artbook.naturalWidth) {
      const m = 18, tw = W - m * 2;
      const ratio = artbook.naturalHeight / artbook.naturalWidth;
      const th = Math.min(240, Math.floor(tw * ratio));
      ctx.save();
      ctx.globalAlpha = 0.9;
      ctx.drawImage(artbook, m, 18, tw, th);
      ctx.restore();
    }

    ctx.save();
    ctx.globalAlpha = 0.72;
    ctx.fillStyle = "rgba(0,0,0,.5)";
    ctx.fillRect(0, 0, W, H);
    ctx.globalAlpha = 1;

    // Title
    ctx.font = "bold 46px 'Orbitron', sans-serif";
    ctx.fillStyle = "rgba(98,228,130,.95)";
    ctx.fillText("ARMOR RAT", 54, H / 2 - 18);

    ctx.font = "15px 'Share Tech Mono', monospace";
    ctx.fillStyle = "rgba(255,255,255,.65)";
    ctx.fillText("Mid-Air Protocol — browser prototype", 56, H / 2 + 12);

    // Pulse on space prompt
    const pulse = 0.7 + 0.3 * Math.sin(world.time * 3.5);
    ctx.globalAlpha = pulse;
    ctx.font = "bold 18px 'Orbitron', monospace";
    ctx.fillStyle = "rgba(255,230,80,.95)";
    ctx.fillText("[ SPACE ] ЧТОБЫ НАЧАТЬ", 56, H / 2 + 52);
    ctx.globalAlpha = 1;

    ctx.font = "12px 'Share Tech Mono', monospace";
    ctx.fillStyle = "rgba(255,255,255,.4)";
    ctx.fillText("SPACE прыжок · R рестарт · P пауза  |  мобайл: кнопка JUMP", 56, H / 2 + 80);

    ctx.restore();
  }

  // ─── Game loop ───────────────────────────────────────────────────────────────
  let last = performance.now();
  let lastArmorStage = 0;

  function tick(now) {
    const dt = Math.min(0.033, (now - last) / 1000); last = now;

    // Pause toggle
    if (keys.has("KeyP")) { keys.delete("KeyP"); paused = !paused; }

    // ── Splash screen ──
    if (!started) {
      world.time += dt;
      if (keys.has("Space")) { keys.delete("Space"); started = true; reset(); }
      ctx.clearRect(0, 0, W, H);
      drawSplash();
      requestAnimationFrame(tick); return;
    }

    // ── Paused ──
    if (paused) {
      world.time += dt;
      ctx.clearRect(0, 0, W, H);
      drawBackground(world.time);
      drawImpact();
      updateAndDrawParticles(0);
      drawRat();
      drawHUD();
      requestAnimationFrame(tick); return;
    }

    // ── Restart ──
    if (keys.has("KeyR")) { keys.delete("KeyR"); reset(); }

    world.time += dt;

    // ── Coyote time countdown ──
    if (p.onGround) {
      p.coyoteTimer = COYOTE_TIME;
    } else {
      p.coyoteTimer = Math.max(0, p.coyoteTimer - dt);
    }

    // ── Jump buffer countdown ──
    if (keys.has("Space")) {
      p.jumpBufferTimer = JUMP_BUFFER;
    } else {
      p.jumpBufferTimer = Math.max(0, p.jumpBufferTimer - dt);
    }

    // ── Jump logic (coyote + buffer) ──
    const canJump = p.coyoteTimer > 0;
    const wantsJump = p.jumpBufferTimer > 0;

    if (wantsJump && canJump) {
      p.onGround = false;
      p.vy = -JUMP;
      p.vx = Math.max(p.vx, 170);
      p.coyoteTimer = 0;
      p.jumpBufferTimer = 0;
      playJumpSound();
    }

    // ── Physics ──
    if (!p.onGround) {
      p.vy += GRAV * dt;
      p.vx *= AIR_DAMP;

      const prevArmor = p.armor;
      p.armor = clamp(p.armor + ARMOR_RATE * dt, 0, 100);

      // Armor stage change sound
      const newStage = stageFromArmor(p.armor);
      if (newStage > lastArmorStage) {
        playArmorUp();
        lastArmorStage = newStage;
      }

      // Armor particles (periodic)
      p.armorTickTimer -= dt;
      if (p.armorTickTimer <= 0 && p.armor < 100) {
        spawnArmorParticle(p.x + 20, p.y - 40);
        p.armorTickTimer = 0.08;
      }
    } else {
      p.vx = Math.max(145, p.vx * 0.985 + 22 * dt);
      // Smooth armor drain instead of instant reset
      p.armor = Math.max(0, p.armor - 220 * dt);
      if (p.armor === 0) lastArmorStage = 0;
    }

    // ── Horizontal wrap ──
    p.x += p.vx * dt;
    if (p.x > W + 80) p.x = -80;

    // ── Vertical ──
    p.y += p.vy * dt;

    if (p.y >= groundY) {
      if (!p.onGround) {
        if (p.armor >= 100) {
          impact.active = true; impact.t = 0;
          impact.x = p.x + 44;
          impact.y = groundY - 2;
          world.camShake = 8.0;
          spawnImpactParticles(p.x + 44, groundY);
          playImpactSound();
        }
      }
      p.y = groundY; p.vy = 0; p.onGround = true;
    }

    // ── Impact animation ──
    if (impact.active) {
      impact.t += dt * 1.6;
      if (impact.t >= 1) { impact.active = false; impact.t = 0; }
    }

    // ── Camera shake (smooth with random offset) ──
    if (world.camShake > 0) {
      world.camOffX = (Math.random() - 0.5) * world.camShake * 2;
      world.camOffY = (Math.random() - 0.5) * world.camShake * 2;
      world.camShake = Math.max(0, world.camShake - dt * 22);
    } else {
      world.camOffX = 0; world.camOffY = 0;
    }

    // ── Render ──
    ctx.save();
    if (world.camShake > 0) {
      ctx.translate(world.camOffX, world.camOffY);
    }

    ctx.clearRect(-20, -20, W + 40, H + 40);
    drawBackground(world.time);
    drawImpact();
    updateAndDrawParticles(dt);
    drawRat();

    ctx.restore();
    drawHUD();

    requestAnimationFrame(tick);
  }

  requestAnimationFrame(tick);
})();
</script>
