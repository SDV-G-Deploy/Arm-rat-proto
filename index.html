<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Armor Rat - Mid-Air Protocol</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Share+Tech+Mono&display=swap');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #060a12; font-family: 'Share Tech Mono', monospace; overflow: hidden; }
    .wrap { height: 100%; display: flex; align-items: center; justify-content: center; padding: 12px; }
    canvas {
      background: #0b0f1a;
      border: 1px solid rgba(98,228,130,.18);
      border-radius: 12px;
      box-shadow: 0 0 0 1px rgba(98,228,130,.06), 0 12px 60px rgba(0,0,0,.7), 0 0 80px rgba(98,228,130,.04);
      image-rendering: pixelated; image-rendering: crisp-edges;
      max-width: min(980px, 96vw); max-height: 92vh;
      width: 980px; height: auto; touch-action: none;
    }
    .mobile-controls { display: none; position: fixed; bottom: 0; left: 0; right: 0; height: 120px; pointer-events: none; z-index: 10; }
    .btn-jump {
      pointer-events: all; position: absolute; bottom: 24px; right: 32px;
      width: 80px; height: 80px; border-radius: 50%;
      background: rgba(98,228,130,.15); border: 2px solid rgba(98,228,130,.5);
      color: rgba(98,228,130,.9); font-family: 'Orbitron', sans-serif;
      font-size: 11px; font-weight: 700; cursor: pointer; user-select: none;
      -webkit-tap-highlight-color: transparent; display: flex; align-items: center; justify-content: center;
      transition: background 0.1s, transform 0.08s; box-shadow: 0 0 20px rgba(98,228,130,.12);
    }
    .btn-jump:active { background: rgba(98,228,130,.32); transform: scale(0.94); }
    @media (pointer: coarse), (max-width: 700px) { .mobile-controls { display: block; } }
    .hud-hint {
      position: fixed; left: 12px; bottom: 10px;
      font-size: 12px; line-height: 1.5; color: rgba(255,255,255,.35);
      font-family: 'Share Tech Mono', monospace; user-select: none; pointer-events: none;
    }
    .hud-hint kbd {
      background: rgba(255,255,255,.08); border: 1px solid rgba(255,255,255,.15);
      padding: 1px 5px; border-radius: 4px; color: rgba(255,255,255,.6);
    }
  </style>
</head>
<body>
  <div class="wrap"><canvas id="c" width="980" height="560"></canvas></div>
  <div class="mobile-controls"><button class="btn-jump" id="btnJump">JUMP</button></div>
  <div class="hud-hint">
    <div><kbd>Space</kbd> jump | <kbd>Space</kbd>x2 double jump (+fatigue) | 100% armor => impact | pigeon = +1 HP</div>
    <div><kbd>R</kbd> restart | <kbd>P</kbd> pause | <kbd>F3</kbd> debug</div>
  </div>

<script>
(() => {
  const canvas = document.getElementById("c");
  const ctx    = canvas.getContext("2d");
  const W = canvas.width, H = canvas.height;

  const clamp = (v,a,b) => Math.max(a,Math.min(b,v));
  const rand  = (a,b)   => a + Math.random()*(b-a);
  const dist  = (ax,ay,bx,by) => Math.hypot(ax-bx, ay-by);

  // в”Ђв”Ђ Assets в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  const ratSheet = new Image(); ratSheet.src = "rat_sprites.png?v=" + Date.now();
  const artbook  = new Image(); artbook.src  = "artbook.png";

  // РђРЅРёРјР°С†РёРё РІ СЃРїСЂР°Р№С‚Р»РёСЃС‚Рµ (row в†’ СЃС‚СЂРѕРєР°, РєР°Р¶РґС‹Р№ С„СЂРµР№Рј FW=96 x FH=96)
  const ANIM_FW = 96, ANIM_FH = 96;
  const ANIMS = {
    idle:   { row:0, frames:1, fps:1,  loop:true  },
    run:    { row:0, frames:6, fps:10, loop:true  },
    run2:   { row:1, frames:6, fps:12, loop:true  },
    jump:   { row:2, frames:6, fps:8,  loop:false, airDriven:true },
    land:   { row:2, frames:1, fps:1,  loop:false, fixedFrame:5 },
    attack: { row:3, frames:6, fps:14, loop:false },
    hurt:   { row:4, frames:6, fps:10, loop:false },
    death:  { row:5, frames:4, fps:7,  loop:false },
  };

  // РЎРѕСЃС‚РѕСЏРЅРёРµ Р°РЅРёРјР°С‚РѕСЂР°
  const anim = {
    name: "run",
    frame: 0,
    timer: 0,
    locked: false,   // locked = Р°РЅРёРјР°С†РёСЏ РёРіСЂР°РµС‚ РґРѕ РєРѕРЅС†Р° (hurt, attack, death)
    onDone: null,
  };
  let landTimer = 0;

  function setAnim(name, lock=false, onDone=null) {
    if (anim.name === name && !lock) return;
    if (anim.locked && name !== "death") return;  // РЅРµ РїСЂРµСЂС‹РІР°С‚СЊ locked Р°РЅРёРјР°С†РёСЋ
    anim.name   = name;
    anim.frame  = ANIMS[name].fixedFrame ?? 0;
    anim.timer  = 0;
    anim.locked = lock;
    anim.onDone = onDone;
  }

  function tickAnim(dt) {
    const a = ANIMS[anim.name];

    // Air animation follows jump phase (up/apex/down) and does not loop.
    if (a.airDriven && !anim.locked) {
      const last = a.frames - 1;
      if (p.vy < -40) {
        const t = clamp((-p.vy) / JUMP_VEL, 0, 1);
        anim.frame = Math.floor((1 - t) * Math.min(2, last));
      } else if (p.vy > 40) {
        const t = clamp(p.vy / (JUMP_VEL * 1.1), 0, 1);
        const from = Math.min(2, last);
        anim.frame = Math.min(last, Math.floor(from + t * (last - from)));
      } else {
        anim.frame = Math.floor(last * 0.5);
      }
      anim.timer = 0;
      return;
    }

    if (typeof a.fixedFrame === "number") {
      anim.frame = a.fixedFrame;
      anim.timer = 0;
      return;
    }
    anim.timer += dt;
    const frameDur = 1 / a.fps;
    while (anim.timer >= frameDur) {
      anim.timer -= frameDur;
      anim.frame++;
      if (anim.frame >= a.frames) {
        if (anim.locked) {
          anim.frame = a.frames - 1;  // СЃС‚РѕРї РЅР° РїРѕСЃР»РµРґРЅРµРј
          anim.locked = false;
          if (anim.onDone) { const done = anim.onDone; anim.onDone = null; done(); }
          break;
        }
        anim.frame = a.loop ? 0 : (a.frames - 1);
      }
    }
  }

  // в”Ђв”Ђ Audio в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  let audioCtx = null;
  const getAC = () => {
    if (!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
    return audioCtx;
  };

  function tone(freq, freq2, type, vol, dur) {
    try {
      const ac=getAC(), o=ac.createOscillator(), g=ac.createGain();
      o.connect(g); g.connect(ac.destination); o.type=type;
      o.frequency.setValueAtTime(freq, ac.currentTime);
      if (freq2) o.frequency.exponentialRampToValueAtTime(freq2, ac.currentTime+dur);
      g.gain.setValueAtTime(vol, ac.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime+dur);
      o.start(); o.stop(ac.currentTime+dur);
    } catch(e){}
  }
  function noise(vol, dur) {
    try {
      const ac=getAC(), n=Math.floor(ac.sampleRate*dur);
      const buf=ac.createBuffer(1,n,ac.sampleRate), d=buf.getChannelData(0);
      for (let i=0;i<n;i++) d[i]=(Math.random()*2-1)*(1-i/n);
      const s=ac.createBufferSource(), g=ac.createGain();
      s.buffer=buf; s.connect(g); g.connect(ac.destination);
      g.gain.setValueAtTime(vol, ac.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime+dur);
      s.start();
    } catch(e){}
  }

  const playJump    = () => tone(320,180,"square",0.09,0.15);
  const playArmorUp = () => tone(440+p.armor*4,660+p.armor*6,"sawtooth",0.04,0.06);
  const playImpact  = () => { tone(90,30,"sawtooth",0.28,0.35); noise(0.18,0.18); };
  const playHurt    = () => { tone(180,80,"square",0.15,0.25); noise(0.08,0.1); };
  const playKill    = () => { tone(600,900,"square",0.07,0.1); };
  const playBlock   = () => tone(300,500,"square",0.06,0.08);
  const playDead    = () => { tone(300,60,"sawtooth",0.2,0.5); noise(0.12,0.3); };
  const playOverheat  = () => { tone(220,80,"sawtooth",0.18,0.4); noise(0.1,0.25); };
  const playHeal       = () => { tone(520,780,"sine",0.12,0.18); tone(650,900,"sine",0.08,0.22); };
  const playDoubleJump = () => tone(420,600,"square",0.07,0.12);
  const playBossHurt   = () => { tone(120,80,"sawtooth",0.22,0.2); noise(0.06,0.1); };
  const playBossDead   = () => { tone(80,40,"sawtooth",0.3,0.6); noise(0.2,0.4); };
  const playBossWarning= () => { tone(200,400,"square",0.1,0.15); tone(200,400,"square",0.1,0.15); };

  // в”Ђв”Ђ Input в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  const keys = new Set();
  window.addEventListener("keydown", e=>{ if(e.code==="Space") e.preventDefault(); keys.add(e.code); });
  window.addEventListener("keyup",   e=>keys.delete(e.code));
  const btnJump = document.getElementById("btnJump");
  btnJump.addEventListener("touchstart",e=>{e.preventDefault();keys.add("Space");},{passive:false});
  btnJump.addEventListener("touchend",  e=>{e.preventDefault();keys.delete("Space");},{passive:false});
  btnJump.addEventListener("mousedown", ()=>keys.add("Space"));
  btnJump.addEventListener("mouseup",   ()=>keys.delete("Space"));

  // в”Ђв”Ђ Constants в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  const GRAV           = 2400;
  const JUMP_VEL       = 820;
  const ARMOR_RATE     = 85;
  const AIR_DAMP       = 0.995;
  const COYOTE_T       = 0.10;
  const groundY        = Math.floor(H * 0.80);
  const MAX_HP         = 3;
  const IMPACT_R       = 200;
  const HURT_IFRAMES   = 1.2;
  // Fatigue: РЅР°РєР°РїР»РёРІР°РµС‚СЃСЏ РїРѕРєР° armor=100% Рё РјС‹С€СЊ РІ РІРѕР|РґСѓС…Рµ
  const FATIGUE_RATE        = 22;   // РµРґРёРЅРёС†/СЃРµРє РїСЂРё РїРѕР»РЅРѕР№ Р±СЂРѕРЅРµ РІ РІРѕР|РґСѓС…Рµ
  const FATIGUE_DRAIN       = 12;   // РµРґРёРЅРёС†/СЃРµРє РІРѕСЃСЃС‚Р°РЅРѕРІР»РµРЅРёСЏ РЅР° Р|РµРјР»Рµ Р±РµР| Р±СЂРѕРЅРё
  const FATIGUE_MAX         = 100;
  const STUN_DURATION       = 1.0;  // СЃРµРє СЃС‚Р°РЅР° РїРѕСЃР»Рµ РїРµСЂРµРіСЂРµРІР°
  const DOUBLE_JUMP_FATIGUE = 35;   // С€С‚СЂР°С„ СѓСЃС‚Р°Р»РѕСЃС‚Рё Р|Р° РґРІРѕР№РЅРѕР№ РїСЂС‹Р¶РѕРє
  const PIGEON_EVERY        = 10;   // РєР°Р¶РґС‹Рµ N С„Р»Р°РµСЂРѕРІ СЃРїР°РІРЅРёРј РіРѕР»СѓР±СЏ
  const WAVE_DURATION       = 20;   // СЃРµРєСѓРЅРґ РЅР° РІРѕР»РЅСѓ
  const BOSS_EVERY          = 5;    // РєР°Р¶РґС‹Рµ N РІРѕР»РЅ вЂ” Р±РѕСЃСЃ

  // в”Ђв”Ђ Stars в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  const stars = Array.from({length:60}, ()=>({
    x:rand(0,W), y:rand(0,H*0.55), r:rand(0.5,2), twinkle:rand(0,Math.PI*2), speed:rand(0.8,2.5)
  }));

  // в”Ђв”Ђ State в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  let paused=false, started=false, gameOver=false, lastArmorStage=0;
  let debugEnabled=false;

  const world = { time:0, camShake:0, camOffX:0, camOffY:0, score:0, wave:1, waveTimer:0, waveCountdown:WAVE_DURATION, boss:null };

  const p = {
    x:160, y:groundY, vx:150, vy:0,
    onGround:true, armor:0, hp:MAX_HP,
    hurtTimer:0, coyoteTimer:0, armorTickTimer:0,
    fatigue:0, stunTimer:0, overheated:false,
    hasDoubleJump:false,   // СЃР±СЂР°СЃС‹РІР°РµС‚СЃСЏ РїСЂРё РїСЂРёР|РµРјР»РµРЅРёРё
    prevSpaceDown:false,   // РґР»СЏ edge detection (РЅРµ hold)
  };

  const impact    = { active:false, t:0, x:0, y:0, id:0, bossHit:false };
  const particles = [];
  const enemies   = [];
  const floaters  = [];
  const scheduledTimeouts = new Set();

  function schedule(fn, delayMs) {
    const id = setTimeout(() => {
      scheduledTimeouts.delete(id);
      fn();
    }, delayMs);
    scheduledTimeouts.add(id);
    return id;
  }

  function clearScheduledTimeouts() {
    for (const id of scheduledTimeouts) clearTimeout(id);
    scheduledTimeouts.clear();
  }


  // в”Ђв”Ђ Enemy spawn в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  let flyerSpawnCount = 0;  // СЃС‡РёС‚Р°РµРј С„Р»Р°РµСЂРѕРІ РґР»СЏ СЃРїР°РІРЅР° РіРѕР»СѓР±СЏ

  function spawnEnemy(type) {
    const fromRight = Math.random() > 0.5;
    const x = fromRight ? W+40 : -40;
    const dir = fromRight ? -1 : 1;

    if (type === "walker") {
      enemies.push({
        type:"walker", x, y:groundY,
        vx:dir*rand(80,140+world.wave*8), vy:0,
        r:18, dead:false, deathT:0,
      });
    } else if (type === "pigeon") {
      // Р“РѕР»СѓР±СЊ вЂ” Р»РµС‚РёС‚ РЅР° РґРѕСЃС‚РёР¶РёРјРѕР№ РґР»СЏ РґРІРѕР№РЅРѕРіРѕ РїСЂС‹Р¶РєР° РІС‹СЃРѕС‚Рµ
      const baseY = rand(groundY*0.38, groundY*0.55);
      enemies.push({
        type:"pigeon", x, y:baseY, baseY,
        vx:dir*rand(70,110),
        amplitude:rand(15,35), freq:rand(0.8,1.6), phase:rand(0,Math.PI*2),
        r:18, dead:false, deathT:0,
        wingPhase:0,
      });
    } else {
      // flyer
      flyerSpawnCount++;
      const baseY = rand(groundY*0.2, groundY*0.55);
      enemies.push({
        type:"flyer", x, y:baseY, baseY,
        vx:dir*rand(100,160+world.wave*10),
        amplitude:rand(28,70), freq:rand(1.5,3.2), phase:rand(0,Math.PI*2),
        r:16, dead:false, deathT:0,
      });
      // РљР°Р¶РґС‹Рµ PIGEON_EVERY С„Р»Р°РµСЂРѕРІ вЂ” СЃРїР°РІРЅРёРј РіРѕР»СѓР±СЏ СЃ Р|Р°РґРµСЂР¶РєРѕР№
      if (flyerSpawnCount % PIGEON_EVERY === 0) {
        schedule(()=>{ if(!gameOver) spawnEnemy("pigeon"); }, rand(800,2000));
      }
    }
  }

  function spawnWave() {
    const count = 2 + Math.floor(world.wave * 1.3);
    for (let i=0;i<count;i++) {
      schedule(()=>{
        if (!gameOver) spawnEnemy(Math.random()<0.45?"flyer":"walker");
      }, i * rand(350,850));
    }
  }

  function spawnBoss() {
    const fromRight = Math.random()>0.5;
    const x = fromRight ? W+80 : -80;
    const dir = fromRight ? -1 : 1;
    const maxHp = 3 + Math.floor(world.wave / BOSS_EVERY);
    world.boss = {
      x, y:groundY,
      vx: dir * rand(55, 80),
      r: 48,
      hp: maxHp, maxHp,
      dead:false, deathT:0,
      hurtFlash:0,
      phase:0,
      stomping:false, stompT:0,
    };
  }

  // в”Ђв”Ђ Reset в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  function reset() {
    p.x=160; p.y=groundY; p.vx=150; p.vy=0;
    p.onGround=true; p.armor=0; p.hp=MAX_HP;
    p.hurtTimer=0; p.coyoteTimer=0; p.armorTickTimer=0;
    p.fatigue=0; p.stunTimer=0; p.overheated=false;
    p.hasDoubleJump=false; p.prevSpaceDown=false;
    impact.active=false; impact.t=0;
    world.time=0; world.camShake=0; world.score=0; world.wave=1; world.waveTimer=0; world.waveCountdown=WAVE_DURATION; world.boss=null;
    particles.length=0; enemies.length=0; floaters.length=0;
    lastArmorStage=0; gameOver=false; paused=false;
    flyerSpawnCount=0;
    clearScheduledTimeouts();
    spawnWave();
  }

  const stageFromArmor = a => a<25?0 : a<55?1 : a<85?2 : 3;

  // в”Ђв”Ђ Particles в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  function addParticle(x,y,vx,vy,r,hue,decay) {
    particles.push({x,y,vx,vy,r,hue,life:1,decay});
  }
  function spawnImpactParticles(x,y) {
    for (let i=0;i<28;i++) {
      const a=rand(-Math.PI,0), s=rand(120,600);
      addParticle(x,y,Math.cos(a)*s,Math.sin(a)*s,rand(2,7),rand(40,70),rand(1.4,2.8));
    }
    for (let i=0;i<12;i++) {
      addParticle(x+rand(-80,80),y,rand(-180,180),rand(-200,-60),rand(3,9),130,rand(2,3.5));
    }
  }
  function spawnEnemyDeath(x,y,type) {
    const hue=type==="flyer"?280:15;
    for (let i=0;i<18;i++) {
      const a=rand(0,Math.PI*2), s=rand(60,300);
      addParticle(x,y,Math.cos(a)*s,Math.sin(a)*s,rand(2,6),hue,rand(1.8,3.5));
    }
  }
  function spawnHurt(x,y) {
    for (let i=0;i<12;i++) {
      const a=rand(-Math.PI,0), s=rand(80,250);
      addParticle(x,y,Math.cos(a)*s,Math.sin(a)*s,rand(2,5),0,rand(2,4));
    }
  }
  function spawnOverheatBurst(x,y) {
    // Р‘СЂРѕРЅСЏ СЂР°Р|Р»РµС‚Р°РµС‚СЃСЏ РєСѓСЃРєР°РјРё вЂ” СЃРёРЅРµРІР°С‚Рѕ-СЃРµСЂС‹Рµ РѕСЃРєРѕР»РєРё
    for (let i=0;i<32;i++) {
      const a=rand(0,Math.PI*2), s=rand(80,400);
      addParticle(x+rand(-20,20),y+rand(-30,10),Math.cos(a)*s,Math.sin(a)*s,rand(3,9),rand(200,230),rand(1.5,3));
    }
    // РћСЂР°РЅР¶РµРІС‹Рµ РёСЃРєСЂС‹ СѓСЃС‚Р°Р»РѕСЃС‚Рё
    for (let i=0;i<16;i++) {
      const a=rand(-Math.PI,0), s=rand(50,200);
      addParticle(x,y,Math.cos(a)*s,Math.sin(a)*s,rand(2,5),rand(20,45),rand(2,4));
    }
  }
  function spawnArmorParticle(x,y) {
    addParticle(x+rand(-20,60),y+rand(-30,10),rand(-60,60),rand(-120,-40),rand(1,3),rand(200,240),rand(3,5));
  }

  function spawnBossDeathParticles(x,y) {
    for (let i=0;i<60;i++) {
      const a=rand(0,Math.PI*2), s=rand(80,600);
      addParticle(x+rand(-30,30),y+rand(-30,30),Math.cos(a)*s,Math.sin(a)*s,rand(4,14),rand(0,30),rand(1,2.5));
    }
    for (let i=0;i<30;i++) {
      addParticle(x+rand(-60,60),y,rand(-200,200),rand(-400,-80),rand(5,12),rand(40,60),rand(1.5,3));
    }
  }

  function addFloater(x,y,text,color) {
    floaters.push({x,y,vy:-55,life:1,decay:1.1,text,color});
  }

  // в”Ђв”Ђ Background в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  function drawBackground(t) {
    const g=ctx.createLinearGradient(0,0,0,H);
    g.addColorStop(0,"#0d1a3a"); g.addColorStop(0.45,"#1c4cff");
    g.addColorStop(0.58,"#6cc7ff"); g.addColorStop(0.581,"#142232"); g.addColorStop(1,"#060a12");
    ctx.fillStyle=g; ctx.fillRect(0,0,W,H);

    ctx.globalAlpha=0.04; ctx.fillStyle="#000";
    for (let y=0;y<H;y+=3) ctx.fillRect(0,y,W,1);
    ctx.globalAlpha=1;

    for (const s of stars) {
      ctx.globalAlpha=0.4+0.4*Math.sin(t*s.speed+s.twinkle);
      ctx.fillStyle="#fff"; ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2); ctx.fill();
    }
    ctx.globalAlpha=1;

    // Clouds
    ctx.globalAlpha=0.18; ctx.fillStyle="#cef";
    const base=(t*18)%(W+260)-260;
    for (let i=0;i<7;i++) {
      const cx=base+i*220, cy=92+(i%2)*18;
      ctx.fillRect(cx,cy,120,6); ctx.fillRect(cx+18,cy+10,160,6);
    }
    ctx.globalAlpha=1;

    // Buildings
    ctx.globalAlpha=0.22; ctx.fillStyle="#000";
    for (let i=0;i<14;i++) {
      const bx=(i*90-(t*28)%90), hh=30+(i%5)*10;
      ctx.fillRect(bx,groundY-120-hh,60,hh);
      ctx.fillRect(bx+18,groundY-140-hh,24,20);
      ctx.globalAlpha=0.28; ctx.fillStyle="rgba(255,230,100,.6)";
      for (let wy=groundY-120-hh+8;wy<groundY-120;wy+=12)
        for (let wx=bx+6;wx<bx+54;wx+=12)
          if (Math.sin(wx*3.7+wy*1.3)>0.2) ctx.fillRect(wx,wy,5,5);
      ctx.globalAlpha=0.22; ctx.fillStyle="#000";
    }
    ctx.globalAlpha=1;

    ctx.fillStyle="rgba(0,0,0,.30)"; ctx.fillRect(0,groundY,W,H-groundY);
    ctx.fillStyle="rgba(98,228,130,.92)";
    const scroll=(t*120)%10;
    for (let x=-10;x<W+10;x+=10) {
      const hh=6+((Math.floor((x+scroll)/10))%3)*2;
      ctx.fillRect(x,groundY-hh,10,hh);
    }
  }

  // в”Ђв”Ђ Draw enemy в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  function drawEnemy(e) {
    ctx.save();
    if (e.dead) {
      ctx.globalAlpha=Math.max(0,1-e.deathT*3);
      ctx.translate(e.x, e.type==="walker"?e.y-e.r:e.y);
      ctx.rotate(e.deathT*5);
      ctx.scale(1+e.deathT*.6,1+e.deathT*.6);
    } else {
      ctx.translate(e.x, e.type==="walker"?e.y-e.r:e.y);
    }

    if (e.type==="walker") {
      // Body
      ctx.fillStyle="#c0392b";
      ctx.beginPath(); ctx.arc(0,0,e.r,0,Math.PI*2); ctx.fill();
      // Spikes
      ctx.fillStyle="#922b21";
      for (let i=0;i<6;i++) {
        const a=(i/6)*Math.PI*2;
        ctx.beginPath();
        ctx.moveTo(Math.cos(a)*e.r,Math.sin(a)*e.r);
        ctx.lineTo(Math.cos(a)*(e.r+7),Math.sin(a)*(e.r+7));
        ctx.lineTo(Math.cos(a+0.3)*(e.r+2),Math.sin(a+0.3)*(e.r+2));
        ctx.fill();
      }
      // Eye
      ctx.fillStyle="#fff"; ctx.beginPath(); ctx.arc(e.vx<0?-6:6,-4,5,0,Math.PI*2); ctx.fill();
      ctx.fillStyle="#1a0000"; ctx.beginPath(); ctx.arc(e.vx<0?-5:7,-4,3,0,Math.PI*2); ctx.fill();
      // Legs
      const leg=Math.sin(world.time*12)*5;
      ctx.strokeStyle="#922b21"; ctx.lineWidth=3;
      for (let i=-1;i<=1;i+=2) {
        ctx.beginPath(); ctx.moveTo(i*6,4); ctx.lineTo(i*12,12+leg*i); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(i*10,2); ctx.lineTo(i*16,10-leg*i); ctx.stroke();
      }
      ctx.globalAlpha*=0.15; ctx.fillStyle="#ff4444";
      ctx.beginPath(); ctx.arc(0,0,e.r*1.9,0,Math.PI*2); ctx.fill();

    } else if (e.type === "pigeon") {
      // Р“РѕР»СѓР±СЊ вЂ” Р±РµР»С‹Р№, СЃ РєСЂС‹Р»С‹С€РєР°РјРё, Р°СѓСЂР° Р»РµС‡РµРЅРёСЏ
      const wing = Math.sin(e.wingPhase || 0) * 0.6;
      // РђСѓСЂР°
      ctx.globalAlpha *= 0.18; ctx.fillStyle="#aaffaa";
      ctx.beginPath(); ctx.arc(0,0,e.r*2.2,0,Math.PI*2); ctx.fill();
      ctx.globalAlpha = e.dead ? Math.max(0,1-e.deathT*3) : 1;
      // РљСЂС‹Р»СЊСЏ
      ctx.fillStyle="#e8e8ff";
      ctx.save();
      ctx.rotate(-wing); ctx.beginPath();
      ctx.ellipse(-e.r, -4, e.r+4, 8, -0.3, 0, Math.PI*2); ctx.fill();
      ctx.restore();
      ctx.save();
      ctx.rotate(wing); ctx.beginPath();
      ctx.ellipse(e.r, -4, e.r+4, 8, 0.3, 0, Math.PI*2); ctx.fill();
      ctx.restore();
      // РўРµР»Рѕ
      ctx.fillStyle="#f0f0ff";
      ctx.beginPath(); ctx.arc(0,0,e.r,0,Math.PI*2); ctx.fill();
      ctx.fillStyle="#ffd700"; ctx.beginPath(); // РєР»СЋРІ
      ctx.moveTo(e.vx<0?-e.r:-e.r+2,2); ctx.lineTo(e.vx<0?-e.r-8:-e.r+10,4); ctx.lineTo(e.vx<0?-e.r:-e.r+2,6); ctx.fill();
      // Р“Р»Р°Р|
      ctx.fillStyle="#333"; ctx.beginPath();
      ctx.arc(e.vx<0?-5:5,-3,3,0,Math.PI*2); ctx.fill();
      ctx.fillStyle="#fff"; ctx.beginPath();
      ctx.arc(e.vx<0?-4:6,-4,1.2,0,Math.PI*2); ctx.fill();
      // РљСЂРµСЃС‚-С…РёР»РєРё РјРёРіР°РµС‚
      ctx.globalAlpha=0.6+0.4*Math.sin(world.time*5);
      ctx.fillStyle="#44ff88"; ctx.font="16px serif";
      ctx.fillText("+", 0, -e.r-8);

    } else {
      // Flyer drone
      // Blade ring
      ctx.strokeStyle="rgba(180,80,255,.6)"; ctx.lineWidth=2;
      const rot=world.time*9;
      for (let i=0;i<3;i++) {
        const a=rot+i*(Math.PI*2/3);
        ctx.beginPath();
        ctx.moveTo(Math.cos(a)*3,Math.sin(a)*3);
        ctx.lineTo(Math.cos(a)*26,Math.sin(a)*26);
        ctx.stroke();
      }
      // Body
      ctx.fillStyle="#6c3483";
      ctx.beginPath(); ctx.arc(0,0,e.r,0,Math.PI*2); ctx.fill();
      ctx.fillStyle="#9b59b6";
      ctx.beginPath(); ctx.arc(0,0,e.r*.6,0,Math.PI*2); ctx.fill();
      // Red eye
      ctx.fillStyle="#e74c3c"; ctx.beginPath(); ctx.arc(0,0,6,0,Math.PI*2); ctx.fill();
      ctx.fillStyle="#fff"; ctx.beginPath(); ctx.arc(e.vx<0?-2:2,-1,2.5,0,Math.PI*2); ctx.fill();
      // Glow
      ctx.globalAlpha*=0.18; ctx.fillStyle="#cc44ff";
      ctx.beginPath(); ctx.arc(0,0,e.r*2.4,0,Math.PI*2); ctx.fill();
    }
    ctx.restore();
  }

  // в”Ђв”Ђ Draw boss в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  function drawBoss() {
    const b = world.boss;
    if (!b) return;
    ctx.save();

    const alpha = b.dead ? Math.max(0, 1-b.deathT*2) : 1;
    ctx.globalAlpha = alpha;

    const bx = b.x, by = b.y - b.r;

    // Death expand
    if (b.dead) {
      ctx.translate(bx, by);
      ctx.scale(1+b.deathT*1.5, 1+b.deathT*1.5);
      ctx.translate(-bx, -by);
    }

    // Hurt flash overlay
    const flashAlpha = b.hurtFlash > 0 ? b.hurtFlash * 0.7 : 0;

    // Shadow
    ctx.globalAlpha = alpha * 0.25;
    ctx.fillStyle = "#000";
    ctx.beginPath(); ctx.ellipse(bx, b.y, b.r*1.1, b.r*0.2, 0, 0, Math.PI*2); ctx.fill();
    ctx.globalAlpha = alpha;

    // Body вЂ” РѕРіСЂРѕРјРЅС‹Р№ РєСЂР°СЃРЅРѕ-РєРѕСЂРёС‡РЅРµРІС‹Р№ Р¶СѓРє
    ctx.fillStyle = b.hurtFlash>0 ? `rgba(255,255,255,${0.5+flashAlpha})` : "#8b1a1a";
    ctx.beginPath(); ctx.arc(bx, by, b.r, 0, Math.PI*2); ctx.fill();

    // Shell segments
    ctx.fillStyle = b.hurtFlash>0 ? `rgba(255,200,200,${flashAlpha})` : "#6b0f0f";
    for (let i=0;i<4;i++) {
      const sy = by - b.r*0.5 + i*(b.r*0.35);
      ctx.beginPath(); ctx.ellipse(bx, sy, b.r*0.85, b.r*0.18, 0, 0, Math.PI*2); ctx.fill();
    }

    // Spikes
    ctx.fillStyle="#5a0a0a";
    for (let i=0;i<8;i++) {
      const a=(i/8)*Math.PI*2 + b.phase*0.3;
      ctx.beginPath();
      ctx.moveTo(bx+Math.cos(a)*b.r, by+Math.sin(a)*b.r);
      ctx.lineTo(bx+Math.cos(a)*(b.r+16), by+Math.sin(a)*(b.r+16));
      ctx.lineTo(bx+Math.cos(a+0.2)*(b.r+4), by+Math.sin(a+0.2)*(b.r+4));
      ctx.fill();
    }

    // Eyes (two big glowing eyes)
    const ex = b.vx<0 ? -14 : 14;
    ctx.fillStyle="#ff0"; ctx.beginPath(); ctx.arc(bx+ex, by-10, 12, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle="#f80"; ctx.beginPath(); ctx.arc(bx-ex, by-10, 12, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle="#111"; ctx.beginPath(); ctx.arc(bx+ex+(b.vx<0?-3:3), by-10, 5, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(bx-ex+(b.vx<0?-3:3), by-10, 5, 0, Math.PI*2); ctx.fill();

    // Angry eyebrows
    ctx.strokeStyle="#300"; ctx.lineWidth=4;
    ctx.beginPath(); ctx.moveTo(bx+ex-10, by-22); ctx.lineTo(bx+ex+8, by-17); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(bx-ex-8, by-17); ctx.lineTo(bx-ex+10, by-22); ctx.stroke();

    // Legs
    const leg = Math.sin(b.phase*6)*8;
    ctx.strokeStyle="#5a0a0a"; ctx.lineWidth=5;
    for (let i=-1;i<=1;i+=2) {
      for (let j=0;j<3;j++) {
        const lx=bx+i*(b.r*0.6), ly=by+j*14-10;
        ctx.beginPath(); ctx.moveTo(lx,ly); ctx.lineTo(lx+i*30, ly+20+leg*(j%2?1:-1)); ctx.stroke();
      }
    }

    // Glow
    ctx.globalAlpha=alpha*0.12; ctx.fillStyle="#ff2200";
    ctx.beginPath(); ctx.arc(bx, by, b.r*2.2, 0, Math.PI*2); ctx.fill();
    ctx.globalAlpha=alpha;

    // HP bar above boss
    if (!b.dead) {
      const bw=b.r*2.4, bh=10, hbx=bx-bw/2, hby=by-b.r-28;
      ctx.fillStyle="rgba(0,0,0,.6)"; ctx.fillRect(hbx-1,hby-1,bw+2,bh+2);
      const hfill = bw*(b.hp/b.maxHp);
      const hg = ctx.createLinearGradient(hbx,0,hbx+hfill,0);
      hg.addColorStop(0,"#e74c3c"); hg.addColorStop(1,"#ff6b35");
      ctx.fillStyle=hg; ctx.fillRect(hbx,hby,hfill,bh);
      ctx.strokeStyle="rgba(255,255,255,.3)"; ctx.lineWidth=1;
      ctx.strokeRect(hbx,hby,bw,bh);
      ctx.fillStyle="#fff"; ctx.font="bold 11px 'Orbitron',monospace";
      ctx.textAlign="center";
      ctx.fillText(`BOSS  ${b.hp}/${b.maxHp}`, bx, hby-4);
      ctx.textAlign="left";
    }

    ctx.restore();
  }
  function drawRat() {
    const loaded = ratSheet.complete && ratSheet.naturalWidth > 0;
    const scale = 0.85;   // 96 * 0.85 в‰€ 82px
    const dw = ANIM_FW * scale, dh = ANIM_FH * scale;
    const px = p.x - dw * 0.3;   // С†РµРЅС‚СЂРёСЂСѓРµРј РїРѕ x
    const py = p.y - dh;          // РЅРѕРіРё РЅР° groundY

    ctx.save();
    if (world.camShake > 0) ctx.translate(world.camOffX, world.camOffY);

    // Blink when hurt (РЅРѕ РЅРµ РІ death)
    if (p.hurtTimer > 0 && anim.name !== "death" && Math.sin(p.hurtTimer * 28) > 0) {
      ctx.restore(); return;
    }

    // Landing glow
    if (impact.active && p.onGround) {
      const tt = impact.t; ctx.globalAlpha = (1-tt)*0.6;
      const rg = ctx.createRadialGradient(px+dw*.5,py+dh*.5,0,px+dw*.5,py+dh*.5,dw*.7);
      rg.addColorStop(0,"rgba(255,230,80,.9)"); rg.addColorStop(1,"transparent");
      ctx.fillStyle = rg; ctx.fillRect(px-dw*.3,py,dw*1.6,dh); ctx.globalAlpha = 1;
    }

    // Armor charge glow
    if (!p.onGround && p.armor > 30) {
      const gs = (p.armor-30)/70; ctx.globalAlpha = gs*0.35;
      const ag = ctx.createRadialGradient(px+dw*.5,py+dh*.4,0,px+dw*.5,py+dh*.4,dw);
      ag.addColorStop(0,"rgba(100,180,255,1)"); ag.addColorStop(1,"transparent");
      ctx.fillStyle = ag; ctx.fillRect(px-dw*.5,py-dh*.3,dw*2,dh*1.5); ctx.globalAlpha = 1;
    }

    ctx.translate(px + dw/2, py + dh/2);
    ctx.translate(-dw/2, -dh/2);

    // Shadow
    ctx.globalAlpha = 0.25; ctx.fillStyle = "#000";
    ctx.fillRect(dw*.15, dh*.92, dw*.7, dh*.04); ctx.globalAlpha = 1;

    if (loaded) {
      const a = ANIMS[anim.name];
      const sx = anim.frame * ANIM_FW;
      const sy = a.row * ANIM_FH;
      ctx.imageSmoothingEnabled = false;
      ctx.drawImage(ratSheet, sx, sy, ANIM_FW, ANIM_FH, 0, 0, dw, dh);
    } else {
      ctx.fillStyle = "#62e482"; ctx.fillRect(0, 0, dw, dh);
    }

    // Overheat stun overlay
    if (p.stunTimer > 0) {
      ctx.globalAlpha = 0.4*(p.stunTimer/STUN_DURATION);
      ctx.fillStyle = "rgba(255,100,20,1)"; ctx.fillRect(0,0,dw,dh);
      ctx.globalAlpha = 1;
      const sr=26, st=world.time*4;
      ctx.fillStyle="rgba(255,220,40,.9)"; ctx.font="16px serif";
      for (let i=0;i<3;i++) {
        const sa=st+i*(Math.PI*2/3);
        ctx.fillText("*", dw*.55+Math.cos(sa)*sr-7, Math.sin(sa)*sr+14);
      }
    }

    // Speed lines РІ РїСЂС‹Р¶РєРµ
    if (!p.onGround && anim.name === "jump") {
      ctx.globalAlpha = 0.4; ctx.fillStyle = "rgba(255,255,255,.9)";
      for (let i=0;i<4;i++) ctx.fillRect(-24-i*14, dh*(0.55+i*0.08), 10+i*8, 2);
      ctx.globalAlpha = 1;
    }

    ctx.restore();
  }

  // в”Ђв”Ђ HUD в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  function drawHUD() {
    const bx=16, by=16, bw=300, bh=18;
    ctx.fillStyle="rgba(0,0,0,.5)"; ctx.fillRect(bx-1,by-1,bw+2,bh+2);
    const fill=(bw-2)*(p.armor/100);
    if (fill>0) {
      const ag=ctx.createLinearGradient(bx+1,0,bx+1+fill,0);
      ag.addColorStop(0,"rgba(98,228,130,.8)");
      ag.addColorStop(0.6,"rgba(255,230,120,.95)");
      ag.addColorStop(1,p.armor>=100?"rgba(255,180,60,1)":"rgba(255,210,80,.95)");
      ctx.fillStyle=ag; ctx.fillRect(bx+1,by+1,fill,bh-2);
    }
    ctx.strokeStyle=p.armor>=100?`rgba(255,200,60,${0.6+0.4*Math.sin(world.time*8)})`:"rgba(255,255,255,.22)";
    ctx.lineWidth=1; ctx.strokeRect(bx,by,bw,bh);

    const stageNames=["BARE","HELM","TORSO","FULL ARMOR"];
    ctx.fillStyle="rgba(255,255,255,.88)"; ctx.font="12px 'Share Tech Mono',monospace";
    const armorLabel = p.stunTimer>0
      ? "OVERHEATED - recovering..."
      : `ARMOR ${Math.round(p.armor)}% - ${stageNames[stageFromArmor(p.armor)]}${!p.onGround?" [CHARGING]":""}`;
    ctx.fillStyle = p.stunTimer>0 ? "rgba(255,100,60,.95)" : "rgba(255,255,255,.88)";
    ctx.fillText(armorLabel, bx, by+bh+14);

    // Fatigue bar
    const fy=by+bh+20, fbw=bw, fbh=10;
    ctx.fillStyle="rgba(0,0,0,.45)"; ctx.fillRect(bx-1,fy-1,fbw+2,fbh+2);
    const ffill=(fbw-2)*(p.fatigue/FATIGUE_MAX);
    if (ffill>0) {
      const fatHue = p.fatigue>80 ? `rgba(255,60,30,.95)` : p.fatigue>50 ? `rgba(255,140,30,.9)` : `rgba(255,200,60,.8)`;
      // Pulse when danger zone
      ctx.globalAlpha = p.fatigue>80 ? 0.7+0.3*Math.sin(world.time*10) : 1;
      ctx.fillStyle=fatHue; ctx.fillRect(bx+1,fy+1,ffill,fbh-2);
      ctx.globalAlpha=1;
    }
    ctx.strokeStyle=p.fatigue>=FATIGUE_MAX?`rgba(255,60,30,${0.7+0.3*Math.sin(world.time*12)})`:"rgba(255,255,255,.15)";
    ctx.lineWidth=1; ctx.strokeRect(bx,fy,fbw,fbh);
    ctx.fillStyle="rgba(255,255,255,.4)"; ctx.font="10px 'Share Tech Mono',monospace";
    ctx.fillText("FATIGUE", bx+fbw+6, fy+fbh-1);

    // Hearts
    const hx=bx+bw+20;
    for (let i=0;i<MAX_HP;i++) {
      ctx.globalAlpha=i<p.hp?1.0:0.2;
      ctx.font="22px serif"; ctx.fillStyle="#e74c3c";
      ctx.fillText("HP", hx+i*28, by+18);
    }
    ctx.globalAlpha=1;

    // Double jump indicator
    const djx = hx + MAX_HP*28 + 12;
    ctx.globalAlpha = p.hasDoubleJump && !p.onGround ? 1 : 0.22;
    ctx.font="18px serif"; ctx.fillStyle="#6af";
    ctx.fillText("DJ", djx, by+18);
    ctx.globalAlpha=1;
    ctx.textAlign="right";
    ctx.font="bold 15px 'Orbitron',monospace"; ctx.fillStyle="rgba(255,230,80,.95)";
    ctx.fillText(`${world.score}`, W-16, by+16);

    if (world.boss && !world.boss.dead) {
      ctx.globalAlpha=0.8+0.2*Math.sin(world.time*6);
      ctx.font="bold 11px 'Orbitron',monospace"; ctx.fillStyle="rgba(255,80,30,1)";
      ctx.fillText(`BOSS`, W-16, by+34);
      ctx.globalAlpha=1;
    } else {
      ctx.font="11px 'Share Tech Mono',monospace"; ctx.fillStyle="rgba(98,228,130,.7)";
      ctx.fillText(`WAVE ${world.wave}`, W-16, by+34);
      const cd = Math.ceil(world.waveCountdown);
      const urgent = cd<=5 && cd>0;
      ctx.globalAlpha = urgent ? 0.7+0.3*Math.sin(world.time*8) : 1;
      ctx.font=`bold 13px 'Orbitron',monospace`;
      ctx.fillStyle = urgent ? "rgba(255,100,30,.95)" : "rgba(255,255,255,.45)";
      ctx.fillText(`${cd}s`, W-16, by+52);
      ctx.globalAlpha=1;
    }
    ctx.textAlign="left";

    if (debugEnabled) {
      ctx.font="10px 'Share Tech Mono',monospace";
      ctx.fillStyle="rgba(120,220,255,.95)";
      ctx.fillText(`DBG wave=${world.wave} enemies=${enemies.length} timers=${scheduledTimeouts.size} impactId=${impact.id} bossHit=${impact.bossHit?1:0}`, bx, H-32);
    }

    // Title
    ctx.globalAlpha=0.55; ctx.font="13px 'Orbitron',monospace"; ctx.fillStyle="rgba(98,228,130,.8)";
    ctx.fillText("ARMOR RAT", bx, H-18);
    ctx.font="11px 'Share Tech Mono',monospace"; ctx.fillStyle="rgba(255,255,255,.35)";
    ctx.fillText("  MID-AIR PROTOCOL", bx+88, H-18);
    ctx.globalAlpha=1;

    if (paused) {
      ctx.save();
      ctx.globalAlpha=0.82; ctx.fillStyle="rgba(0,0,0,.6)"; ctx.fillRect(0,0,W,H);
      ctx.globalAlpha=1; ctx.fillStyle="#fff";
      ctx.font="bold 32px 'Orbitron',monospace"; ctx.textAlign="center";
      ctx.fillText("PAUSED", W/2, H/2-8);
      ctx.font="14px 'Share Tech Mono',monospace"; ctx.fillStyle="rgba(98,228,130,.8)";
      ctx.fillText("press P to continue", W/2, H/2+22);
      ctx.textAlign="left"; ctx.restore();
    }
  }

  // в”Ђв”Ђ Impact в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  function drawImpact() {
    if (!impact.active) return;
    const t=impact.t; ctx.save();
    ctx.globalAlpha=Math.pow(1-t,1.5)*0.85;
    ctx.strokeStyle="rgba(255,230,80,1)"; ctx.lineWidth=5*(1-t);
    ctx.beginPath(); ctx.arc(impact.x,impact.y,12+t*180,0,Math.PI*2); ctx.stroke();
    if (t>0.1) {
      const t2=(t-0.1)/.9;
      ctx.globalAlpha=Math.pow(1-t2,2)*0.5; ctx.lineWidth=3;
      ctx.beginPath(); ctx.arc(impact.x,impact.y,12+t2*250,0,Math.PI*2); ctx.stroke();
    }
    ctx.globalAlpha=Math.pow(1-t,2)*0.45;
    const gf=ctx.createLinearGradient(0,groundY-6,0,groundY+2);
    gf.addColorStop(0,"rgba(255,230,80,1)"); gf.addColorStop(1,"transparent");
    ctx.fillStyle=gf; ctx.fillRect(0,groundY-6,W,8);
    ctx.restore();
  }

  // в”Ђв”Ђ Particles в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  function updateAndDrawParticles(dt) {
    for (let i=particles.length-1;i>=0;i--) {
      const pt=particles[i];
      pt.life-=pt.decay*dt;
      if (pt.life<=0) { particles.splice(i,1); continue; }
      pt.vy+=1200*dt; pt.x+=pt.vx*dt; pt.y+=pt.vy*dt;
      ctx.globalAlpha=pt.life*.9;
      ctx.fillStyle=`hsl(${pt.hue},90%,65%)`;
      ctx.beginPath(); ctx.arc(pt.x,pt.y,pt.r*pt.life,0,Math.PI*2); ctx.fill();
    }
    ctx.globalAlpha=1;
  }

  // в”Ђв”Ђ Floaters в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  function updateAndDrawFloaters(dt) {
    ctx.textAlign="center";
    for (let i=floaters.length-1;i>=0;i--) {
      const f=floaters[i];
      f.life-=f.decay*dt;
      if (f.life<=0) { floaters.splice(i,1); continue; }
      f.y+=f.vy*dt;
      ctx.globalAlpha=f.life;
      ctx.font="bold 15px 'Orbitron',monospace";
      ctx.fillStyle=f.color;
      ctx.fillText(f.text, f.x, f.y);
    }
    ctx.textAlign="left"; ctx.globalAlpha=1;
  }

  // в”Ђв”Ђ Splash в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  function drawSplash() {
    drawBackground(world.time);
    if (artbook.complete && artbook.naturalWidth) {
      const m=18, tw=W-m*2, ratio=artbook.naturalHeight/artbook.naturalWidth;
      const th=Math.min(240,Math.floor(tw*ratio));
      ctx.save(); ctx.globalAlpha=0.88;
      ctx.drawImage(artbook,m,18,tw,th); ctx.restore();
    }
    ctx.save();
    ctx.globalAlpha=0.72; ctx.fillStyle="rgba(0,0,0,.5)"; ctx.fillRect(0,0,W,H);
    ctx.globalAlpha=1;
    ctx.font="bold 46px 'Orbitron',sans-serif"; ctx.fillStyle="rgba(98,228,130,.95)";
    ctx.fillText("ARMOR RAT", 54, H/2-18);
    ctx.font="15px 'Share Tech Mono',monospace"; ctx.fillStyle="rgba(255,255,255,.65)";
    ctx.fillText("Mid-Air Protocol - browser prototype", 56, H/2+12);
    const pulse=0.7+0.3*Math.sin(world.time*3.5);
    ctx.globalAlpha=pulse; ctx.font="bold 18px 'Orbitron',monospace"; ctx.fillStyle="rgba(255,230,80,.95)";
    ctx.fillText("[ SPACE ] TO START", 56, H/2+52); ctx.globalAlpha=1;
    ctx.font="12px 'Share Tech Mono',monospace"; ctx.fillStyle="rgba(255,255,255,.4)";
    ctx.fillText("SPACE jump | armor = shield | 100% + landing = impact | 3 HP", 56, H/2+80);
    ctx.restore();
  }

  // в”Ђв”Ђ Game Over в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  function drawGameOver() {
    drawBackground(world.time);
    ctx.save();
    ctx.globalAlpha=0.88; ctx.fillStyle="rgba(0,0,0,.72)"; ctx.fillRect(0,0,W,H);
    ctx.globalAlpha=1; ctx.textAlign="center";

    ctx.font="bold 56px 'Orbitron',monospace"; ctx.fillStyle="#e74c3c";
    ctx.fillText("GAME OVER", W/2, H/2-44);

    ctx.font="18px 'Share Tech Mono',monospace"; ctx.fillStyle="rgba(255,230,80,.9)";
    ctx.fillText(`SCORE: ${world.score}`, W/2, H/2+4);
    ctx.fillStyle="rgba(98,228,130,.7)";
    ctx.fillText(`WAVE: ${world.wave}`, W/2, H/2+30);

    const pulse=0.7+0.3*Math.sin(world.time*3.5);
    ctx.globalAlpha=pulse; ctx.font="bold 16px 'Orbitron',monospace"; ctx.fillStyle="rgba(255,255,255,.92)";
    ctx.fillText("[ SPACE ] PLAY AGAIN", W/2, H/2+72);
    ctx.globalAlpha=1; ctx.textAlign="left"; ctx.restore();
  }

  // в”Ђв”Ђ Main loop в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  let last = performance.now();

  function tick(now) {
    const dt=Math.min(0.033,(now-last)/1000); last=now;

    if (keys.has("KeyP")) { keys.delete("KeyP"); if(!gameOver) paused=!paused; }
    if (keys.has("F3")) { keys.delete("F3"); debugEnabled = !debugEnabled; }

    if (!started) {
      world.time+=dt;
      if (keys.has("Space")) { keys.delete("Space"); started=true; reset(); }
      ctx.clearRect(0,0,W,H); drawSplash();
      requestAnimationFrame(tick); return;
    }

    if (gameOver) {
      world.time+=dt;
      if (keys.has("Space")) { keys.delete("Space"); reset(); }
      ctx.clearRect(0,0,W,H); drawGameOver();
      requestAnimationFrame(tick); return;
    }

    if (paused) {
      world.time+=dt;
      ctx.clearRect(0,0,W,H); drawBackground(world.time);
      drawImpact(); updateAndDrawParticles(0);
      enemies.forEach(drawEnemy); drawBoss(); drawRat();
      updateAndDrawFloaters(0); drawHUD();
      requestAnimationFrame(tick); return;
    }

    if (keys.has("KeyR")) { keys.delete("KeyR"); reset(); }

    world.time+=dt;

    // Animation state machine
    landTimer = Math.max(0, landTimer - dt);
    if (!anim.locked) {
      if (!p.onGround)            setAnim("jump");
      else if (landTimer > 0)     setAnim("land");
      else if (p.stunTimer > 0)   setAnim("idle");
      else if (p.armor >= 85)     setAnim("run2");
      else if (p.vx > 155)        setAnim("run");
      else                        setAnim("idle");
    }
    tickAnim(dt);

    // Wave manager вЂ” С‚Р°Р№РјРµСЂ
    world.waveTimer+=dt;
    world.waveCountdown = Math.max(0, WAVE_DURATION - world.waveTimer);

    const isBossWave = (world.wave % BOSS_EVERY === 0);

    // РљРѕРЅРµС† РІРѕР»РЅС‹: Р»РёР±Рѕ С‚Р°Р№РјРµСЂ РёСЃС‚С‘Рє, Р»РёР±Рѕ Р±РѕСЃСЃ СѓР±РёС‚
    const waveOver = isBossWave
      ? (world.boss && world.boss.dead && world.boss.deathT > 0.5)
      : (world.waveTimer >= WAVE_DURATION);

    if (waveOver) {
      // РЎРЅРѕСЃРёРј РІСЃРµС… РІСЂР°РіРѕРІ РјРіРЅРѕРІРµРЅРЅРѕ
      enemies.length = 0;
      clearScheduledTimeouts();
      if (world.boss && world.boss.dead) world.boss = null;
      world.wave++; world.waveTimer=0; world.waveCountdown=WAVE_DURATION;

      if (world.wave % BOSS_EVERY === 0) {
        // РЎР»РµРґСѓСЋС‰Р°СЏ РІРѕР»РЅР° вЂ” Р±РѕСЃСЃ
        addFloater(W/2, H/2-30, `BOSS INCOMING`, "rgba(255,80,30,1)");
        schedule(()=>{ if(!gameOver) { spawnBoss(); playBossWarning(); } }, 1800);
      } else {
        addFloater(W/2, H/2-20, `WAVE ${world.wave}`, "rgba(98,228,130,1)");
        spawnWave();
      }
    }

    // РћР±РЅРѕРІР»РµРЅРёРµ Р±РѕСЃСЃР°
    if (world.boss) {
      const b = world.boss;
      if (b.dead) {
        b.deathT += dt*1.5;
        if (b.deathT > 1.5) world.boss = null;
      } else {
        b.phase += dt;
        b.x += b.vx * dt;
        b.hurtFlash = Math.max(0, b.hurtFlash - dt*4);
        // Р Р°Р|РІРѕСЂРѕС‚ Сѓ РєСЂР°С‘РІ
        if (b.x < b.r+20)  { b.x = b.r+20;  b.vx = Math.abs(b.vx); }
        if (b.x > W-b.r-20){ b.x = W-b.r-20; b.vx = -Math.abs(b.vx); }

        // РљРѕР»Р»РёР|РёСЏ СЃ РёРіСЂРѕРєРѕРј
        if (p.hurtTimer<=0) {
          const pcx=p.x+30, pcy=p.y-32;
          if (dist(pcx,pcy,b.x,b.y-b.r) < b.r+30) {
            if (p.armor>0) {
              // Р‘СЂРѕРЅСЏ Р±Р»РѕРєРёСЂСѓРµС‚ вЂ” РЅРѕ Р±РѕСЃСЃР° РЅРµ РѕС‚Р±СЂР°СЃС‹РІР°РµРј
              p.hurtTimer=0.4; playBlock();
              addFloater(pcx,pcy-36,"BLOCK!","rgba(100,210,255,1)");
            } else {
              p.hp--; p.hurtTimer=HURT_IFRAMES; world.camShake=6;
              spawnHurt(pcx,pcy); playHurt();
              addFloater(pcx,pcy-36,"-1 HP","rgba(255,80,80,1)");
              if (p.hp<=0) { gameOver=true; playDead(); setAnim("death", true); }
            }
          }
        }

        // РЈСЂРѕРЅ Р±РѕСЃСЃСѓ РѕС‚ РёРјРїР°РєС‚Р°
        if (impact.active && impact.t < 0.15) {
          if (!impact.bossHit && dist(impact.x,impact.y,b.x,b.y-b.r) < IMPACT_R+b.r) {
            impact.bossHit = true;
            b.hp--;
            b.hurtFlash = 1.0;
            world.camShake = 7;
            playBossHurt();
            addFloater(b.x, b.y-b.r-50, `-1 HP BOSS`, "rgba(255,180,60,1)");
            if (b.hp<=0) {
              b.dead=true; b.deathT=0;
              world.score += 1000 + world.wave*100;
              spawnBossDeathParticles(b.x, b.y-b.r);
              playBossDead(); world.camShake=12;
              addFloater(b.x, b.y-b.r-60, `+${1000+world.wave*100} BOSS!`, "rgba(255,230,60,1)");
            }
          }
        }
      }
    }

    // Coyote + jump buffer
    if (p.onGround) { p.coyoteTimer=COYOTE_T; p.hasDoubleJump=true; }
    else p.coyoteTimer=Math.max(0,p.coyoteTimer-dt);
    const spaceDown = keys.has("Space");
    const spaceJustPressed = spaceDown && !p.prevSpaceDown;
    p.prevSpaceDown = spaceDown;

    // Stun timer (after overheat)
    if (p.stunTimer>0) {
      p.stunTimer=Math.max(0,p.stunTimer-dt);
      p.coyoteTimer=0;
    }

    if (p.stunTimer<=0) {
      if (spaceJustPressed) {
        if (p.coyoteTimer>0) {
          // РћР±С‹С‡РЅС‹Р№ РїСЂС‹Р¶РѕРє (РёР»Рё coyote)
          p.onGround=false; p.vy=-JUMP_VEL; p.vx=Math.max(p.vx,170);
          p.coyoteTimer=0; playJump();
        } else if (!p.onGround && p.hasDoubleJump) {
          // Р”Р’РћР™РќРћР™ РїСЂС‹Р¶РѕРє
          p.hasDoubleJump=false;
          p.vy=-JUMP_VEL*0.85;  // С‡СѓС‚СЊ СЃР»Р°Р±РµРµ
          p.fatigue=clamp(p.fatigue+DOUBLE_JUMP_FATIGUE, 0, FATIGUE_MAX);
          playDoubleJump();
          // Р’РёР|СѓР°Р»СЊРЅС‹Р№ СЂС‹РІРѕРє вЂ” С‡Р°СЃС‚РёС†С‹ РІРЅРёР|
          for (let i=0;i<10;i++) {
            addParticle(p.x+rand(10,50),p.y-30,rand(-80,80),rand(60,200),rand(2,5),rand(180,220),rand(2,4));
          }
          addFloater(p.x+30,p.y-55,"DOUBLE!","rgba(100,200,255,.9)");
          // Р•СЃР»Рё СѓСЃС‚Р°Р»РѕСЃС‚СЊ РґРѕСЃС‚РёРіР»Р° РјР°РєСЃРёРјСѓРјР° РѕС‚ РґРІРѕР№РЅРѕРіРѕ РїСЂС‹Р¶РєР°
          if (p.fatigue>=FATIGUE_MAX && !p.overheated) {
            p.overheated=true; p.armor=0; lastArmorStage=0;
            p.stunTimer=STUN_DURATION; world.camShake=6;
            spawnOverheatBurst(p.x+30,p.y-40);
            playOverheat();
            addFloater(p.x+30,p.y-70,"OVERHEATED!","rgba(255,100,30,1)");
          }
        }
      }
    }

    // Physics
    if (!p.onGround) {
      p.vy+=GRAV*dt; p.vx*=AIR_DAMP;
      p.armor=clamp(p.armor+ARMOR_RATE*dt,0,100);
      const ns=stageFromArmor(p.armor);
      if (ns>lastArmorStage) { playArmorUp(); lastArmorStage=ns; }
      p.armorTickTimer-=dt;
      if (p.armorTickTimer<=0 && p.armor<100) {
        spawnArmorParticle(p.x+20,p.y-40); p.armorTickTimer=0.08;
      }

      // РЈСЃС‚Р°Р»РѕСЃС‚СЊ СЂР°СЃС‚С‘С‚ С‚РѕР»СЊРєРѕ РєРѕРіРґР° Р±СЂРѕРЅСЏ 100%
      if (p.armor>=100 && p.stunTimer<=0) {
        p.fatigue=clamp(p.fatigue+FATIGUE_RATE*dt,0,FATIGUE_MAX);
        if (p.fatigue>=FATIGUE_MAX && !p.overheated) {
          // РџР•Р Р•Р“Р Р•Р’ вЂ” Р±СЂРѕРЅСЏ СЃР»РµС‚Р°РµС‚, СЃС‚Р°РЅ
          p.overheated=true;
          p.armor=0; lastArmorStage=0;
          p.stunTimer=STUN_DURATION;
          world.camShake=6;
          spawnOverheatBurst(p.x+30, p.y-40);
          playOverheat();
          addFloater(p.x+30,p.y-60,"OVERHEATED!","rgba(255,100,30,1)");
        }
      }
    } else {
      p.vx=Math.max(145,p.vx*.985+22*dt);
      p.armor=Math.max(0,p.armor-220*dt);
      if (p.armor===0) { lastArmorStage=0; p.overheated=false; }
      // Р’РѕСЃСЃС‚Р°РЅРѕРІР»РµРЅРёРµ СѓСЃС‚Р°Р»РѕСЃС‚Рё РЅР° Р|РµРјР»Рµ (С‚РѕР»СЊРєРѕ Р±РµР| Р±СЂРѕРЅРё)
      if (p.armor<5) {
        p.fatigue=Math.max(0,p.fatigue-FATIGUE_DRAIN*dt);
      }
    }
    // Landing
    if (p.y>=groundY) {
      const justLanded = !p.onGround;
      if (justLanded) landTimer = 0.10;
      if (justLanded && p.armor>=100) {
        impact.active=true; impact.t=0; impact.id++; impact.bossHit=false;
        impact.x=p.x+44; impact.y=groundY-2;
        world.camShake=8;
        spawnImpactParticles(p.x+44,groundY); playImpact();
        setAnim("attack", true);
        // Kill enemies in blast radius
        for (const e of enemies) {
          if (e.dead) continue;
          const ey=e.type==="walker"?e.y-e.r:e.y;
          if (dist(impact.x,impact.y,e.x,ey)<IMPACT_R) {
            e.dead=true; e.deathT=0;
            spawnEnemyDeath(e.x,ey,e.type);
            const pts=e.type==="flyer"?200:100;
            world.score+=pts; playKill();
            addFloater(e.x,ey-30,`+${pts}`,"rgba(255,230,80,1)");
          }
        }
      }
      p.y=groundY; p.vy=0; p.onGround=true; p.hasDoubleJump=true;
    }

    // Hurt timer
    if (p.hurtTimer>0) p.hurtTimer=Math.max(0,p.hurtTimer-dt);

    // Enemy update + collision
    for (let i=enemies.length-1;i>=0;i--) {
      const e=enemies[i];
      if (e.dead) { e.deathT+=dt*2.5; if(e.deathT>=1) enemies.splice(i,1); continue; }

      e.x+=e.vx*dt;
      if (e.type==="flyer") { e.phase+=e.freq*dt; e.y=e.baseY+Math.sin(e.phase)*e.amplitude; }
      if (e.type==="pigeon") {
        e.phase+=e.freq*dt; e.y=e.baseY+Math.sin(e.phase)*e.amplitude;
        e.wingPhase = (e.wingPhase||0) + 8*dt;
      }
      if (e.x<-100||e.x>W+100) { enemies.splice(i,1); continue; }

      // Collision
      if (p.hurtTimer<=0) {
        const pcx=p.x+30, pcy=p.y-32;
        const ex=e.x, ey=(e.type==="walker")?e.y-e.r:e.y;
        if (dist(pcx,pcy,ex,ey) < e.r+28) {

          if (e.type==="pigeon") {
            // Р“РѕР»СѓР±СЊ вЂ” Р»РµС‡РµРЅРёРµ! РЈР±РёРІР°РµРј РіРѕР»СѓР±СЏ, +1 HP
            e.dead=true; e.deathT=0;
            p.hp=Math.min(p.hp+1, MAX_HP);
            // РљСЂР°СЃРёРІС‹Рµ С‡Р°СЃС‚РёС†С‹ Р»РµС‡РµРЅРёСЏ
            for (let pi=0;pi<20;pi++) {
              const a=rand(0,Math.PI*2), s=rand(50,220);
              addParticle(ex,ey,Math.cos(a)*s,Math.sin(a)*s,rand(2,6),rand(100,140),rand(1.5,3));
            }
            playHeal();
            world.camShake=2;
            addFloater(ex,ey-40,"+1 HP HEAL!","rgba(80,255,140,1)");

          } else if (p.armor>0) {
            e.vx*=-1.2; e.x+=e.vx>0?50:-50;
            world.score+=50; playBlock();
            p.hurtTimer=0.25;
            addFloater(ex,ey-36,"+50 BLOCK!","rgba(100,210,255,1)");
          } else {
            p.hp--; p.hurtTimer=HURT_IFRAMES; world.camShake=5;
            spawnHurt(pcx,pcy); playHurt();
            setAnim("hurt", true);
            addFloater(pcx,pcy-36,"-1 HP","rgba(255,80,80,1)");
            e.vx*=-1; e.x+=e.vx>0?40:-40;
            if (p.hp<=0) { gameOver=true; playDead(); setAnim("death", true); }
          }
        }
      }
    }

    // Impact anim
    if (impact.active) { impact.t+=dt*1.6; if(impact.t>=1){impact.active=false;impact.t=0;} }

    // Camera shake
    if (world.camShake>0) {
      world.camOffX=(Math.random()-.5)*world.camShake*2;
      world.camOffY=(Math.random()-.5)*world.camShake*2;
      world.camShake=Math.max(0,world.camShake-dt*22);
    } else { world.camOffX=0; world.camOffY=0; }

    // Render
    ctx.save();
    if (world.camShake>0) ctx.translate(world.camOffX,world.camOffY);
    ctx.clearRect(-20,-20,W+40,H+40);
    drawBackground(world.time); drawImpact();
    updateAndDrawParticles(dt);
    enemies.forEach(drawEnemy);
    drawBoss();
    drawRat();
    ctx.restore();
    updateAndDrawFloaters(dt);
    drawHUD();

    requestAnimationFrame(tick);
  }

  requestAnimationFrame(tick);
})();
</script>
</body>
</html>
