<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Armor Rat – Mid-Air Protocol (Prototype)</title>
  <style>
    html, body { margin:0; height:100%; background:#0b0f1a; font-family:system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; }
    .wrap { height:100%; display:flex; align-items:center; justify-content:center; padding:12px; box-sizing:border-box; }
    canvas{
      background:#0b0f1a;
      border:1px solid rgba(255,255,255,.14);
      border-radius:16px;
      box-shadow:0 12px 50px rgba(0,0,0,.45);
      image-rendering: pixelated; image-rendering: crisp-edges;
      max-width:min(980px, 96vw);
      max-height:92vh;
      width:980px; height:auto;
    }
    .hud{
      position:fixed; left:12px; bottom:10px;
      font-size:14px; line-height:1.35; user-select:none;
      color:rgba(255,255,255,.86); text-shadow:0 1px 0 rgba(0,0,0,.35);
    }
    .hud kbd{
      background:rgba(255,255,255,.12);
      border:1px solid rgba(255,255,255,.18);
      padding:2px 6px; border-radius:6px; font-weight:600;
    }
    .hud .row{ margin-top:4px; }
  </style>
</head>
<body>
  <div class="wrap"><canvas id="c" width="980" height="560"></canvas></div>
  <div class="hud">
    <div><kbd>Space</kbd> прыжок · в воздухе растёт броня · приземлился с 100% → удар</div>
    <div class="row"><kbd>R</kbd> перезапуск · <kbd>P</kbd> пауза</div>
  </div>

<script>
(() => {
  const canvas = document.getElementById("c");
  const ctx = canvas.getContext("2d");

  const W = canvas.width, H = canvas.height;
  const clamp = (v,a,b)=>Math.max(a,Math.min(b,v));

  // Assets (local files in same folder)
  const sprite = new Image(); sprite.src = "sprite.png";
  const artbook = new Image(); artbook.src = "artbook.png";

  const keys = new Set();
  window.addEventListener("keydown", (e) => { if (e.code==="Space") e.preventDefault(); keys.add(e.code); });
  window.addEventListener("keyup", (e) => keys.delete(e.code));

  let paused = false;
  const groundY = Math.floor(H * 0.80);
  const world = { time:0, camShake:0 };

  const p = { x:160, y:groundY, vx:150, vy:0, onGround:true, armor:0 };

  const GRAV=2400, JUMP=820, ARMOR_RATE=85, AIR_DAMP=0.995;
  const impact = { active:false, t:0, x:0, y:0 };

  function reset(){
    p.x=160; p.y=groundY; p.vx=150; p.vy=0; p.onGround=true; p.armor=0;
    impact.active=false; impact.t=0; world.time=0; world.camShake=0;
  }
  function stageFromArmor(a){ return a<25?0 : a<55?1 : a<85?2 : 3; }

  function drawBackground(t){
    const g = ctx.createLinearGradient(0,0,0,H);
    g.addColorStop(0,"#1c4cff"); g.addColorStop(0.58,"#6cc7ff");
    g.addColorStop(0.581,"#142232"); g.addColorStop(1,"#0b0f1a");
    ctx.fillStyle=g; ctx.fillRect(0,0,W,H);

    ctx.globalAlpha=0.06; ctx.fillStyle="#000";
    for(let y=0;y<H;y+=3) ctx.fillRect(0,y,W,1);
    ctx.globalAlpha=1;

    ctx.globalAlpha=0.22; ctx.fillStyle="#fff";
    const base=(t*18)%(W+260)-260;
    for(let i=0;i<7;i++){
      const x=base+i*220, y=92+(i%2)*18;
      ctx.fillRect(x,y,120,6); ctx.fillRect(x+18,y+10,160,6);
    }
    ctx.globalAlpha=1;

    ctx.globalAlpha=0.18; ctx.fillStyle="#000";
    for(let i=0;i<14;i++){
      const x=(i*90 - (t*28)%90), hh=30+(i%5)*10;
      ctx.fillRect(x,groundY-120-hh,60,hh);
      ctx.fillRect(x+18,groundY-140-hh,24,20);
    }
    ctx.globalAlpha=1;

    ctx.fillStyle="rgba(0,0,0,.30)";
    ctx.fillRect(0,groundY,W,H-groundY);

    ctx.fillStyle="rgba(98,228,130,.92)";
    const scroll=(t*120)%10;
    for(let x=-10;x<W+10;x+=10){
      const hh=6 + ((Math.floor((x+scroll)/10))%3)*2;
      ctx.fillRect(x,groundY-hh,10,hh);
    }
  }

  function drawHUD(){
    const x=16,y=16,bw=360,bh=18;
    ctx.fillStyle="rgba(0,0,0,.35)"; ctx.fillRect(x,y,bw,bh);
    ctx.strokeStyle="rgba(255,255,255,.22)"; ctx.strokeRect(x,y,bw,bh);
    const fill=(bw-2)*(p.armor/100);
    ctx.fillStyle="rgba(255,230,120,.95)"; ctx.fillRect(x+1,y+1,fill,bh-2);

    ctx.fillStyle="rgba(255,255,255,.92)";
    ctx.font="14px system-ui";
    const label=p.onGround?"ARMOR (airborne to charge)":"ARMOR CHARGING";
    ctx.fillText(label+" — "+Math.round(p.armor)+"%", x, y+bh+16);

    ctx.globalAlpha=0.9; ctx.font="16px system-ui";
    ctx.fillText("Armor Rat: Mid-Air Protocol — prototype", x, H-18);
    ctx.globalAlpha=1;

    if(paused){
      ctx.save();
      ctx.globalAlpha=0.85; ctx.fillStyle="rgba(0,0,0,.55)"; ctx.fillRect(0,0,W,H);
      ctx.globalAlpha=1; ctx.fillStyle="rgba(255,255,255,.95)";
      ctx.font="28px system-ui"; ctx.fillText("Пауза", W/2-44, H/2-6);
      ctx.font="16px system-ui"; ctx.fillText("Нажми P чтобы продолжить", W/2-118, H/2+24);
      ctx.restore();
    }
  }

  function drawImpact(){
    if(!impact.active) return;
    const t=impact.t;
    ctx.save();
    ctx.globalAlpha=(1-t)*0.9;
    ctx.strokeStyle="rgba(255,230,120,1)"; ctx.lineWidth=6;
    ctx.beginPath(); ctx.arc(impact.x,impact.y,10+t*140,0,Math.PI*2); ctx.stroke();
    ctx.globalAlpha=(1-t)*0.35; ctx.fillStyle="rgba(255,230,120,1)";
    ctx.fillRect(0,groundY-2,W,4);
    ctx.restore();
  }

  function drawRat(){
    if(!sprite.complete || sprite.naturalWidth===0){
      ctx.fillStyle="#fff"; ctx.fillRect(p.x,p.y-40,60,40); return;
    }
    const frames=4;
    const fw=Math.floor(sprite.naturalWidth/frames), fh=sprite.naturalHeight;
    const frame=stageFromArmor(p.armor), sx=frame*fw;

    const tilt=p.onGround?0:clamp(-p.vy/1800,-0.35,0.35);
    const scale=1.35, dw=fw*scale, dh=fh*scale;
    const px=p.x, py=p.y-dh+6;

    ctx.save();
    if(world.camShake>0){
      const s=world.camShake;
      ctx.translate((Math.random()-0.5)*s,(Math.random()-0.5)*s);
    }

    // glow pulse on landing impact
    if(impact.active && p.onGround){
      const tt=impact.t;
      ctx.globalAlpha=(1-tt)*0.55;
      ctx.fillStyle="rgba(255,230,120,1)";
      ctx.beginPath();
      ctx.arc(px+dw*0.70, py+dh*0.35, 18+tt*40, 0, Math.PI*2);
      ctx.fill();
      ctx.globalAlpha=1;
    }

    ctx.translate(px+dw/2, py+dh/2);
    ctx.rotate(tilt);
    ctx.translate(-dw/2, -dh/2);

    ctx.globalAlpha=0.25; ctx.fillStyle="#000";
    ctx.fillRect(dw*0.15, dh*0.86, dw*0.7, dh*0.06);
    ctx.globalAlpha=1;

    ctx.imageSmoothingEnabled=false;
    ctx.drawImage(sprite, sx,0,fw,fh, 0,0,dw,dh);

    if(!p.onGround){
      ctx.globalAlpha=0.55; ctx.fillStyle="#fff";
      for(let i=0;i<3;i++) ctx.fillRect(-22-i*16, dh*0.62+i*6, 12, 2);
      ctx.globalAlpha=1;
    }
    ctx.restore();
  }

  // Splash
  let started=false;

  function drawSplash(){
    drawBackground(world.time);
    if(artbook.complete && artbook.naturalWidth){
      const m=18, tw=W-m*2;
      const ratio=artbook.naturalHeight/artbook.naturalWidth;
      const th=Math.min(240, Math.floor(tw*ratio));
      ctx.save(); ctx.globalAlpha=0.98;
      ctx.drawImage(artbook, m, 18, tw, th);
      ctx.restore();
    }
    ctx.save();
    ctx.globalAlpha=0.75; ctx.fillStyle="rgba(0,0,0,.45)"; ctx.fillRect(0,0,W,H);
    ctx.globalAlpha=1; ctx.fillStyle="rgba(255,255,255,.95)";
    ctx.font="34px system-ui"; ctx.fillText("ARMOR RAT", 54, H/2-10);
    ctx.font="16px system-ui"; ctx.fillText("Mid-Air Protocol — browser prototype", 56, H/2+18);
    ctx.globalAlpha=0.95; ctx.fillStyle="rgba(255,230,120,.95)";
    ctx.font="18px system-ui"; ctx.fillText("Нажми SPACE чтобы начать", 56, H/2+56);
    ctx.globalAlpha=0.85; ctx.fillStyle="rgba(255,255,255,.9)";
    ctx.font="14px system-ui"; ctx.fillText("Управление: SPACE — прыжок · R — перезапуск · P — пауза", 56, H/2+86);
    ctx.restore();
  }

  let last=performance.now();
  function tick(now){
    const dt=Math.min(0.033, (now-last)/1000); last=now;

    if(keys.has("KeyP")){ keys.delete("KeyP"); paused=!paused; }

    if(!started){
      world.time += dt;
      if(keys.has("Space")){ keys.delete("Space"); started=true; reset(); }
      ctx.clearRect(0,0,W,H); drawSplash();
      requestAnimationFrame(tick); return;
    }

    if(paused){
      world.time += dt;
      ctx.clearRect(0,0,W,H);
      drawBackground(world.time); drawImpact(); drawRat(); drawHUD();
      requestAnimationFrame(tick); return;
    }

    if(keys.has("KeyR")){ keys.delete("KeyR"); reset(); }

    world.time += dt;

    if(keys.has("Space") && p.onGround){
      p.onGround=false; p.vy=-JUMP;
      p.vx=Math.max(p.vx,170); // angled feel
    }

    if(!p.onGround){
      p.vy += GRAV*dt;
      p.vx *= AIR_DAMP;
      p.armor = clamp(p.armor + ARMOR_RATE*dt, 0, 100);
    } else {
      p.vx = Math.max(145, p.vx*0.985 + 22*dt);
      p.armor = 0;
    }

    p.x += p.vx*dt;
    if(p.x > W+80) p.x=-80;

    p.y += p.vy*dt;

    if(p.y >= groundY){
      if(!p.onGround){
        if(p.armor >= 100){
          impact.active=true; impact.t=0;
          impact.x = p.x + 44;
          impact.y = groundY - 2;
          world.camShake = 6.0;
        }
      }
      p.y=groundY; p.vy=0; p.onGround=true;
    }

    if(impact.active){
      impact.t += dt*1.6;
      if(impact.t >= 1){ impact.active=false; impact.t=0; }
    }

    world.camShake = Math.max(0, world.camShake - dt*18);

    ctx.clearRect(0,0,W,H);
    drawBackground(world.time);
    drawImpact();
    drawRat();
    drawHUD();

    requestAnimationFrame(tick);
  }

  requestAnimationFrame(tick);
})();
</script>
</body>
</html>
